<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evening Anchor 鈥?缁欒嚜宸变竴涓€煎緱鐨勫鏅?/title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #0F0E17;
      --bg-card:     #1A1830;
      --bg-input:    #232140;
      --bg-hover:    #2D2B52;
      --accent-warm: #FFB86C;
      --accent-cool: #7AA2F7;
      --accent-low:  #9ECE6A;
      --accent-red:  #F7768E;
      --text-primary:#E8E6F0;
      --text-muted:  #8B87A3;
      --text-dim:    #565478;
      --border:      #2D2B4E;
      --glow-warm:   rgba(255,184,108,0.18);
      --glow-cool:   rgba(122,162,247,0.12);
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      right: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(255,184,108,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(122,162,247,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* 鈹€鈹€鈹€ HEADER 鈹€鈹€鈹€ */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease-out both;
    }
    .header-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.9;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.4rem;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* 鈹€鈹€鈹€ FORM CARD 鈹€鈹€鈹€ */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeUp 0.6s ease-out 0.1s both;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .form-card.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      display: none;
    }

    .field {
      margin-bottom: 28px;
    }
    .field:last-of-type { margin-bottom: 0; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field-label .emoji {
      font-size: 1rem;
      opacity: 0.85;
    }

    /* 鈹€鈹€鈹€ TIME INPUT 鈹€鈹€鈹€ */
    .time-input-wrap {
      position: relative;
    }
    .time-input-wrap input[type="time"] {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .time-input-wrap input[type="time"]:focus {
      border-color: var(--accent-warm);
      box-shadow: 0 0 0 3px var(--glow-warm);
    }
    .time-input-wrap input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }

    /* 鈹€鈹€鈹€ TEXTAREA 鈹€鈹€鈹€ */
    textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'LXGW Wen Kai', serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--text-dim); font-style: italic; }
    textarea:focus { border-color: var(--accent-warm); }

    /* 鈹€鈹€鈹€ MUST-DO BLOCK 鈹€鈹€鈹€ */
    .mustdo-block {
      background: rgba(255, 184, 108, 0.08);
      border: 1.5px solid rgba(255, 184, 108, 0.35);
      border-left: 3px solid var(--accent-warm);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .mustdo-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .mustdo-text {
      font-size: 1rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* 鈹€鈹€鈹€ SUBTASKS (涓讳换鍔″潡鍐呭瓙椤? 鈹€鈹€鈹€ */
    .block-subtasks {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 184, 108, 0.3);
    }
    .subtasks-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .subtask-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.6;
      padding-left: 4px;
    }
    .subtask-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-warm);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* 鈹€鈹€鈹€ BUTTON GROUP 鈹€鈹€鈹€ */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-group.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .opt-btn {
      flex: 1;
      min-width: 70px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      user-select: none;
    }
    .opt-btn:hover {
      border-color: var(--text-dim);
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .opt-btn .opt-icon {
      font-size: 1.2rem;
      line-height: 1;
    }
    .opt-btn.selected {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: rgba(255,184,108,0.08);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2);
    }
    .opt-btn.selected-cool {
      border-color: var(--accent-cool);
      color: var(--accent-cool);
      background: rgba(122,162,247,0.08);
      box-shadow: 0 0 0 1px rgba(122,162,247,0.2);
    }
    .opt-btn .sub {
      font-size: 0.7rem;
      opacity: 0.65;
      font-weight: 400;
    }

    /* 鈹€鈹€鈹€ COMPACT BTN GROUP (energy, tomorrow) 鈹€鈹€鈹€ */
    .energy-group,
    .compact-group {
      flex-direction: row;
      align-items: center;
    }
    .energy-group .opt-btn,
    .compact-group .opt-btn {
      flex-direction: row;
      padding: 8px 14px;
      gap: 6px;
      border-radius: 8px;
      min-width: auto;
    }
    .energy-group .opt-icon,
    .compact-group .opt-icon {
      font-size: 1rem;
    }
    .energy-group .opt-icon {
      display: inline-block;
      transform: rotate(-90deg);
    }
    .energy-group .opt-text,
    .compact-group .opt-text {
      font-size: 0.85rem;
      font-weight: 500;
    }
    .energy-group .sub,
    .compact-group .sub { display: none; }

    /* 鈹€鈹€鈹€ CONDITIONAL 鈹€鈹€鈹€ */
    .conditional-field {
      margin-top: 14px;
      display: none;
      animation: fadeUp 0.25s ease-out;
    }
    .conditional-field.visible { display: block; }

    /* 鈹€鈹€鈹€ GENERATE BTN 鈹€鈹€鈹€ */
    .generate-btn {
      width: 100%;
      margin-top: 32px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #e09a5a 0%, #ff9f45 50%, #f5a04a 100%);
      border: none;
      border-radius: 14px;
      color: #1a1000;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
    }
    .generate-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,184,108,0.35);
      filter: brightness(1.08);
    }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled {
      background: var(--bg-input);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }
    .generate-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26,16,0,0.3);
      border-top-color: #1a1000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .generate-btn.loading .spinner { display: block; }
    .generate-btn.loading .btn-text { opacity: 0.7; }

    /* 鈹€鈹€鈹€ PLAN VIEW 鈹€鈹€鈹€ */
    .plan-view {
      display: none;
      animation: fadeUp 0.5s ease-out;
    }
    .plan-view.visible {
      display: block;
    }

    .plan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease-out 0.05s both;
    }
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { border-color: var(--text-dim); color: var(--text-primary); }
    .plan-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 鈹€鈹€鈹€ SUMMARY BAR 鈹€鈹€鈹€ */
    .summary-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.5s ease-out 0.1s both;
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .summary-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .summary-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .summary-sep { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
    .summary-hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-left: auto;
      font-style: italic;
    }

    /* 鈹€鈹€鈹€ PLAN BLOCKS 鈹€鈹€鈹€ */
    .plan-blocks {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .plan-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-16px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, box-shadow 0.2s;
    }
    .plan-block.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .plan-block:hover {
      border-color: var(--text-dim);
    }

    /* Left accent bar */
    .plan-block::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent-warm);
    }
    .plan-block.easy::before { background: var(--accent-low); }
    .plan-block.focus::before { background: var(--accent-cool); }
    .plan-block.rest::before { background: #bb9af7; }

    /* First block 鈥?highlighted start */
    .plan-block.first {
      border-color: rgba(255,184,108,0.4);
      background: linear-gradient(135deg, rgba(255,184,108,0.06) 0%, var(--bg-card) 60%);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2), 0 4px 20px rgba(255,184,108,0.08);
    }
    .plan-block.first::before { background: var(--accent-warm); width: 4px; }

    .block-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .block-start { color: var(--accent-warm); font-weight: 500; }
    .block-end { color: var(--text-dim); }
    .block-duration {
      margin-left: 6px;
      padding: 1px 7px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
    }

    /* 鈹€鈹€鈹€ CHECKBOX 鈹€鈹€鈹€ */
    .block-check {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 22px;
      height: 22px;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-check:hover {
      border-color: var(--accent-warm);
      background: rgba(255,184,108,0.05);
    }
    .block-check:checked {
      background: var(--accent-warm);
      border-color: var(--accent-warm);
    }
    .block-check:checked::after {
      content: '鉁?;
      color: #1a1000;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    /* Completed state */
    .plan-block.done {
      opacity: 0.5;
    }
    .plan-block.done .block-action {
      text-decoration: line-through;
      text-decoration-color: var(--text-dim);
      color: var(--text-muted);
    }
    .plan-block.done .block-icon { opacity: 0.5; }
    .plan-block.done .block-desc { display: none; }
    .plan-block.done .block-subtasks { display: none; }
    .plan-block.done .block-time .block-start { color: var(--text-dim); }
    .plan-block.done .first-badge { display: none; }
    .plan-block.done::before { background: var(--text-dim); }

    .block-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
      padding-right: 32px;
    }
    .block-icon { font-size: 1.1rem; }
    .block-action {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      transition: color 0.25s, text-decoration 0.25s;
    }
    .first .block-action { color: var(--accent-warm); }

    .block-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .block-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }
    .block-tag.tag-easy { background: rgba(158,206,106,0.12); color: var(--accent-low); }
    .block-tag.tag-focus { background: rgba(122,162,247,0.12); color: var(--accent-cool); }
    .block-tag.tag-warm { background: rgba(255,184,108,0.12); color: var(--accent-warm); }
    .block-tag.tag-rest { background: rgba(187,154,247,0.12); color: #bb9af7; }
    .block-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* First step badge */
    .first-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,184,108,0.15);
      color: var(--accent-warm);
      border: 1px solid rgba(255,184,108,0.3);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.04em;
      animation: pulse-badge 2.5s ease-in-out infinite;
    }

    /* 鈹€鈹€鈹€ LOW POWER VERSION 鈹€鈹€鈹€ */
    .lowpower-toggle {
      margin-top: 20px;
      text-align: center;
    }
    .lowpower-trigger {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-dim);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .lowpower-trigger:hover {
      border-color: var(--text-muted);
      color: var(--text-muted);
      background: var(--bg-card);
    }
    .lowpower-section {
      margin-top: 12px;
      display: none;
      animation: fadeUp 0.3s ease-out;
    }
    .lowpower-section.visible { display: block; }

    .lowpower-header {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
      font-style: italic;
    }
    .lowpower-block {
      background: rgba(35,33,64,0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
    }
    .lowpower-block.visible { opacity: 1; transform: translateY(0); }
    .lowpower-block::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-low);
      margin-right: 10px;
      vertical-align: middle;
    }
    .lowpower-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .lowpower-action {
      font-size: 0.92rem;
      color: var(--text-muted);
      display: inline;
      margin-left: 8px;
    }
    .lowpower-note {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      padding-left: 14px;
      font-style: italic;
    }

    /* 鈹€鈹€鈹€ FOOTER HINT 鈹€鈹€鈹€ */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 28px;
      font-style: italic;
    }

    /* 鈹€鈹€鈹€ ANIMATIONS 鈹€鈹€鈹€ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-badge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,108,0.0); }
      50% { box-shadow: 0 0 0 6px rgba(255,184,108,0.12); }
    }

    /* 鈹€鈹€鈹€ DIVIDER 鈹€鈹€鈹€ */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;

      .compact-mode .block-duration { font-size: 0.62rem; padding: 0 5px; }
      .compact-mode .block-main {

        gap: 6px;
      }
      .compact-mode .block-icon { font-size: 0.95rem; }
      .compact-mode .block-action {

        line-height: 1.2;
      }
      .compact-mode .block-meta { gap: 6px; }
      .compact-mode .block-tag {
        font-size: 0.64rem;
        padding: 1px 6px;
      }
      /* Collapsible desc */
      .compact-mode .block-desc {
        display: none;
        font-size: 0.74rem;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed var(--border);
      }
      .compact-mode .plan-block.desc-open .block-desc {
        display: block;
      }
      .compact-mode .plan-block::after {
        content: '鈰?;
        position: absolute;

      /* Subtasks in compact */

      /* Summary bar compact */

      /* Non-compact mobile still gets some reduction */

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }

<script>
  /* 鈹€鈹€鈹€ STATE 鈹€鈹€鈹€ */
  const state = {
    energy: 'mid',
    scene: 'alone',
    goal: 'productivity',
    tomorrow: 'none',
    tomorrowTime: '08:00',
    mustDo: '',
    sleepTime: '23:00'
  };

  /* 鈹€鈹€鈹€ SELECT OPTION 鈹€鈹€鈹€ */
  function selectOpt(el, group) {
    const parent = el.parentElement;
    parent.querySelectorAll('.opt-btn').forEach(b => {
      b.classList.remove('selected', 'selected-cool');
    });
    el.classList.add(group === 'scene' || group === 'goal' ? 'selected-cool' : 'selected');
    state[group] = el.dataset.value;

    if (group === 'tomorrow') {
      document.getElementById('tomorrowTimeField').classList.toggle('visible', state.tomorrow === 'has');
    }
    if (group === 'scene') {
      document.getElementById('parentsReturnField').classList.toggle('visible', state.scene === 'parents');
    }
  }

  /* 鈹€鈹€鈹€ ADD MINUTES TO TIME 鈹€鈹€鈹€ */
  function addMinutes(timeStr, mins) {
    const [h, m] = timeStr.split(':').map(Number);
    const totalMins = h * 60 + m + mins;
    const nh = Math.floor(totalMins / 60) % 24;
    const nm = totalMins % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }

  /* 鈹€鈹€鈹€ TIME RANGE LABEL 鈹€鈹€鈹€ */
  function timeRange(start, mins) {
    const end = addMinutes(start, mins);
    return { start, end };
  }

  /* 鈹€鈹€鈹€ GOAL CONFIG 鈹€鈹€鈹€ */
  const goalConfig = {
    rest: {
      icon: '馃泲锔?, label: '浼戞伅',
      mainLabel: '鏀炬澗韬績',
      blocks: (start, E) => []
    },
    productivity: {
      icon: '馃搵', label: '鐢熶骇鍔?,
      mainLabel: '涓撴敞浠诲姟',
      blocks: (start, E) => []
    },
    social: {
      icon: '馃挰', label: '绀句氦',
      mainLabel: '绀句氦杩炴帴',
      blocks: (start, E) => []
    },
    hobby: {
      icon: '馃帹', label: '鐖卞ソ',
      mainLabel: '鎶曞叆鐖卞ソ',
      blocks: (start, E) => []
    },
    health: {
      icon: '馃弮', label: '鍋ュ悍',
      mainLabel: '韬績閿荤偧',
      blocks: (start, E) => []
    }
  };

  /* 鈹€鈹€鈹€ SCENE LABELS 鈹€鈹€鈹€ */
  const sceneLabels = { alone: '鐙嚜鐢ㄩ', couple: '鍜屼即渚ｅ悆', parents: '鍥炵埗姣嶅鍚? };

  /* 鈹€鈹€鈹€ PLAN BUILDER 鈹€鈹€鈹€ */
  function buildPlan(arrival, energy, scene, goal, tomorrow, parentsReturnTime, mustDo, sleepTime) {
    const blocks = [];
    let cursor = arrival; // 'HH:MM'
    const totalMins = (h, m) => h * 60 + m;
    const [ah, am] = arrival.split(':').map(Number);
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalAvail = totalMins(sh, sm) - totalMins(ah, am);

    const isLow = energy === 'low';
    const isHigh = energy === 'high';
    const isMid = energy === 'mid';
    const hasTomorrow = tomorrow === 'has';

    // 鈹€鈹€ BLOCK 1: Unwind (always first, < 5min) 鈹€鈹€
    const u1 = timeRange(cursor, 5);
    blocks.push({
      time: u1, icon: '馃憢', action: '鎹㈣。鏈?+ 鏀跺ソ闅忚韩鐗╁搧', type: 'easy',
      tag: '杞绘澗', desc: '鑴辨帀涓婄彮瑁咃紝鎹笂灞呭鏈嶏紝鎶婂寘鏀惧ソ銆傜珛鍒昏繘鍏ュ鐨勭姸鎬併€?,
      isFirst: true
    });
    cursor = u1.end;

    // 鈹€鈹€ BLOCK 2: Quick reset 鈹€鈹€
    const u2 = timeRange(cursor, 5);
    blocks.push({
      time: u2, icon: '馃挧', action: '鍠濇澂姘?+ 绠€鍗曟暣鐞?, type: 'easy',
      tag: '杞绘澗', desc: '琛ュ厖姘村垎锛岄『鎵嬫妸妗岄潰/娌欏彂鏀舵嬀涓€涓嬨€?,
      isFirst: false
    });
    cursor = u2.end;

    // 鈹€鈹€ BLOCK 3: Dinner (scene-aware) 鈹€鈹€
    if (scene === 'parents' && parentsReturnTime) {
      const [rh, rm] = parentsReturnTime.split(':').map(Number);
      const [ah, am] = arrival.split(':').map(Number);
      const homeMins = rh * 60 + rm - (ah * 60 + am);

      if (homeMins >= 10) {
        const prep = timeRange(cursor, 10);
        blocks.push({
          time: prep, icon: '馃憢', action: '鎹㈣。鏈?+ 鏀舵嬀涓滆タ', type: 'easy',
          tag: '鍑嗗', desc: '鎹笂骞插噣琛ｆ湇锛屽甫涓婄粰鐖稿鐨勪笢瑗?,
          isFirst: false
        });
        cursor = prep.end;
      }
      if (homeMins >= 30) {
        const snack = timeRange(cursor, Math.min(15, homeMins - 20));
        blocks.push({
          time: snack, icon: '馃嵔锔?, action: '鍦ㄥ鍏堝灚涓€鐐?, type: 'easy',
          tag: '琛ュ厖鑳介噺', desc: '鏃堕棿鍏呰鐨勮瘽鍏堝悆鐐癸紝涓嶇敤楗跨潃鍘荤埗姣嶅',
          isFirst: false
        });
        cursor = snack.end;
      }
      if (homeMins >= 5) {
        const depart = timeRange(parentsReturnTime, 10);
        blocks.push({
          time: depart, icon: '馃殫', action: '鍑哄彂鍘荤埗姣嶅', type: 'easy',
          tag: '鍑哄彂', desc: '甯︿笂缁欑埜濡堢殑涓滆タ锛屽嚭鍙?,
          isFirst: false
        });
        cursor = depart.end;
      }
      const parentsDinner = timeRange(cursor, 90);
      blocks.push({
        time: parentsDinner, icon: '馃嵔锔?, action: '鍦ㄧ埗姣嶅鍚冮キ', type: 'warm',
        tag: '瀹跺涵鏃跺厜', desc: '鍜岀埜濡堜竴璧峰悆楗€佽亰澶┿€傛斁涓嬫墜鏈猴紝濂藉ソ闄粬浠?,
        isFirst: false
      });
      cursor = parentsDinner.end;
      const backHome = timeRange(cursor, 10);
      blocks.push({
        time: backHome, icon: '馃彔', action: '鍥炶嚜宸卞', type: 'easy',
        tag: '鍥炲', desc: '瀹夊叏鍒板锛岀畝鍗曟敹鎷句竴涓?,
        isFirst: false
      });
      cursor = backHome.end;
    } else if (scene === 'couple') {
      const d1 = timeRange(cursor, 35);
      blocks.push({
        time: d1, icon: '馃嵔锔?, action: '鍜屼即渚ｄ竴璧峰仛/鍚冩櫄椁?, type: 'easy',
        tag: '闄即', desc: '涓€璧峰仛楗垨鑰呭彨澶栧崠锛岃竟鍚冭竟鑱婅亰澶?,
        isFirst: false
      });
      cursor = d1.end;
    } else {
      const d1 = timeRange(cursor, isLow ? 20 : (isHigh ? 40 : 30));
      blocks.push({
        time: d1, icon: '馃嵔锔?, action: '鐙嚜鐢ㄩ', type: 'easy',
        tag: '琛ュ厖鑳介噺', desc: '涓嶈鍒锋墜鏈猴紝濂藉ソ鍚冮キ銆傚彲浠ラ厤鐐归煶涔愭垨鎾',
        isFirst: false
      });
      cursor = d1.end;
    }

    // 鈹€鈹€ BUFFER 鈹€鈹€
    const buf1 = timeRange(cursor, 10);
    blocks.push({
      time: buf1, icon: '鈴?, action: '缂撳啿浼戞伅', type: 'rest',
      tag: '杩囨浮', desc: '鍧愮潃鍙戜細鍎垮憜锛岃韬綋浠?宸ヤ綔妯″紡"鍒囨崲鍑烘潵',
      isFirst: false
    });
    cursor = buf1.end;

    // 鈹€鈹€ MAIN GOAL BLOCKS 鈹€鈹€
    if (goal === 'productivity') {
      if (isHigh) {
        const b1 = timeRange(cursor, 90);
        blocks.push({
          time: b1, icon: '馃搵', action: '娣卞害宸ヤ綔鏃舵', type: 'focus',
          tag: '涓撴敞', desc: '鍏虫帀閫氱煡锛屼笓娉ㄥ仛鏈€閲嶈鐨?-2浠朵簨銆傛寜鐣寗閽熻妭濂忔潵銆?,
          sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [],
          isFirst: false
        });
        cursor = b1.end;
        const b1buf = timeRange(cursor, 10);
        blocks.push({ time: b1buf, icon: '鈽?, action: '鐭殏浼戞伅', type: 'rest', tag: '鏀炬澗', desc: '绔欒捣鏉ヨ蛋鍔紝浼稿睍涓€涓嬶紝鍠濈偣姘?, isFirst: false });
        cursor = b1buf.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 45);
        blocks.push({
          time: b1, icon: '馃搵', action: '鏁寸悊 + 杞婚噺浠诲姟', type: 'warm',
          tag: '閫傚害', desc: '澶勭悊绉帇娑堟伅銆佹暣鐞嗗緟鍔炴竻鍗曘€佸畬鎴?浠跺皬浜?,
          sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [],
          isFirst: false
        });
        cursor = b1.end;
      }
      // 浣庣簿鍔涳細璺宠繃鐢熶骇鍔涳紝鐩存帴浼戞伅
    }

    if (goal === 'health') {
      if (isHigh) {
        const b1 = timeRange(cursor, 45);
        blocks.push({ time: b1, icon: '馃弮', action: '杩愬姩鏃堕棿', type: 'focus', tag: '娲诲姏', desc: '璺戞/鍋ヨ韩/鐟滀冀锛岄€変竴涓姩璧锋潵', sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 25);
        blocks.push({ time: b1, icon: '馃', action: '杞诲害娲诲姩', type: 'warm', tag: '閫傚害', desc: '鏁ｆ銆佹媺浼告垨瀹ゅ唴绠€鍗曟椿鍔?, sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'hobby') {
      if (isHigh) {
        const b1 = timeRange(cursor, 60);
        blocks.push({ time: b1, icon: '馃帹', action: '娌夋蹈鐖卞ソ鏃堕棿', type: 'focus', tag: '涓撴敞', desc: '鐢荤敾銆佷箰鍣ㄣ€佽涔︺€佸啓浣溾€斺€旂粰鑷繁涓€娈典笉琚墦鎵扮殑鏃堕棿', sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 30);
        blocks.push({ time: b1, icon: '馃帹', action: '闅忔墜鍒涗綔', type: 'warm', tag: '閫傚害', desc: '鍋氫竴鐐瑰氨濂斤紝涓嶉渶瑕佸畬鏁翠綔鍝?, sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'social') {
      if (isHigh || isMid) {
        const b1 = timeRange(cursor, 60);
        blocks.push({ time: b1, icon: '馃挰', action: scene === 'parents' ? '涓庣埗姣嶉€氳瘽' : (scene === 'couple' ? '鍜屼即渚ｈ亰澶? : '鑱旂郴鏈嬪弸'), type: 'warm', tag: '杩炴帴', desc: scene === 'parents' ? '缁欑埜濡堟墦涓數璇? : (scene === 'couple' ? '涓や釜浜哄ソ濂借亰鑱婂ぉ' : '瑙嗛/璇煶/娑堟伅鑱旂郴涓€涓?), sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'rest') {
      if (isLow) {
        const b1 = timeRange(cursor, 50);
        blocks.push({ time: b1, icon: '馃幀', action: '鏃犺剳濞变箰鏃堕棿', type: 'rest', tag: '鏀炬澗', desc: '鍒峰墽/缁艰壓/瑙嗛锛屼笉鍔ㄨ剳瀛愶紝绾斁鏉?, sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else {
        const b1 = timeRange(cursor, 45);
        blocks.push({ time: b1, icon: '馃幀', action: '鏀剧┖濞变箰', type: 'rest', tag: '浼戞伅', desc: '閫変竴涓交鏉剧殑鑺傜洰锛岃鑷繁褰诲簳鏀炬澗', sub: mustDo ? mustDo.trim().split(/[,锛孿n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    // 鈹€鈹€ EVENING WIND DOWN 鈹€鈹€
    const windDownMins = isLow ? 30 : 45;
    const w1 = timeRange(cursor, windDownMins);
    blocks.push({
      time: w1, icon: '馃寵', action: '鏅氶棿鏀炬澗鏃跺厜', type: 'rest',
      tag: '鍑忓帇', desc: isLow ? '韬虹潃鍚煶涔愩€佺炕缈绘墜鏈恒€佷粈涔堥兘涓嶆兂' : '娲楁急 + 鏀炬澗闃呰/杞诲害娴忚',
      isFirst: false
    });
    cursor = w1.end;

    // 鈹€鈹€ TOMORROW PREP 鈹€鈹€
    if (hasTomorrow) {
      const p1 = timeRange(cursor, 15);
      blocks.push({
        time: p1, icon: '馃搶', action: '鏄庢棩鍑嗗', type: 'easy',
        tag: '鏀跺熬', desc: '鏁寸悊鑳屽寘銆佺‘璁ら椆閽熴€佸垪鍑烘槑澶╂渶閲嶈鐨?浠朵簨',
        isFirst: false
      });
      cursor = p1.end;
    }

    // 鈹€鈹€ BEDTIME ROUTINE 鈹€鈹€
    const remaining = totalMins(sh, sm) - totalMins(...cursor.split(':').map(Number));
    if (remaining > 0) {
      const bedMins = Math.min(remaining, 20);
      const bed1 = timeRange(cursor, bedMins);
      blocks.push({
        time: bed1, icon: '馃泚', action: '鐫″墠浠紡', type: 'rest',
        tag: '鏀跺熬', desc: '娲楁急銆佸叧鐏€佸啓3浠朵粖澶╂弧鎰忕殑浜嬶紙鍙€夛級',
        isFirst: false
      });
      cursor = bed1.end;
    }

    return blocks;
  }

  /* 鈹€鈹€鈹€ LOW POWER PLAN 鈹€鈹€鈹€ */
  function buildLowPowerPlan(arrival, sleepTime) {
    const blocks = [];
    let cursor = arrival;
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalMins = (h, m) => h * 60 + m;

    const b1 = timeRange(cursor, 5);
    blocks.push({ time: b1, action: '鎹㈣。鏈嶃€佸潗涓?, note: '涓嶉渶瑕佸仛浠讳綍浜嬶紝鍙槸鎹㈠ソ琛ｆ湇' });
    cursor = b1.end;

    const b2 = timeRange(cursor, 20);
    blocks.push({ time: b2, action: '绠€鍗曞悆鐐逛笢瑗?, note: '鐑竴纰楁堡銆佸悆鐐规按鏋滐紝涓嶈鍕夊己鍋氶キ' });
    cursor = b2.end;

    const b3 = timeRange(cursor, 30);
    blocks.push({ time: b3, action: '韬虹潃鎴栧潗鐫€锛岄殢渚垮共浠€涔?, note: '鐪嬫墜鏈恒€佸惉姝屻€佷粈涔堥兘涓嶅共閮借' });
    cursor = b3.end;

    const b4 = timeRange(cursor, 15);
    blocks.push({ time: b4, action: '绠€鍗曟礂婕?, note: '鍒风墮銆佹礂鑴稿氨澶熶簡' });
    cursor = b4.end;

    const b5 = timeRange(cursor, 10);
    blocks.push({ time: b5, action: '鍏崇伅锛岃汉涓?, note: '鐫′笉鐫€涔熸病鍏崇郴锛岃汉鐫€灏辨槸浼戞伅' });
    cursor = b5.end;

    return blocks;
  }

  /* 鈹€鈹€鈹€ TAG CLASS 鈹€鈹€鈹€ */
  function tagClass(type) {
    const map = { easy: 'tag-easy', focus: 'tag-focus', warm: 'tag-warm', rest: 'tag-rest' };
    return map[type] || '';
  }

  /* 鈹€鈹€鈹€ GENERATE 鈹€鈹€鈹€ */
  function generatePlan() {
    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      const arrival = document.getElementById('arrivalTime').value;
      const sleepTime = document.getElementById('sleepTimeInput').value;
      const mustDo = document.getElementById('mustDoInput').value;
      const parentsReturnTime = state.scene === 'parents'
        ? document.getElementById('parentsReturnTime').value
        : null;
      const mainPlan = buildPlan(arrival, state.energy, state.scene, state.goal, state.tomorrow, parentsReturnTime, mustDo, sleepTime);
      const lowPower = buildLowPowerPlan(arrival, sleepTime);

      renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo);

      document.getElementById('formCard').classList.add('hidden');
      document.getElementById('planView').classList.add('visible');
      document.getElementById('progressWrap').style.display = 'block';
      updateProgress();
      btn.classList.remove('loading');
      btn.disabled = false;

      // Stagger blocks
      document.querySelectorAll('.plan-block').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 120);
      });

      // Low power blocks stagger
      setTimeout(() => {
        document.querySelectorAll('.lowpower-block').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 80);
        });
      }, mainPlan.length * 120 + 300);
    }, 900);
  }

  /* 鈹€鈹€鈹€ RENDER PLAN 鈹€鈹€鈹€ */
  function renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo) {
    // Summary
    const [ah, am] = arrival.split(':').map(Number);
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalMins = (sh * 60 + sm) - (ah * 60 + am);
    const hrs = Math.floor(totalMins / 60);
    const mins = totalMins % 60;
    const energyLabel = { low: '馃 浣?, mid: '馃煛 涓?, high: '馃攱 楂? };
    const goalLabel = goalConfig[state.goal]?.label || state.goal;

    document.getElementById('summaryBar').innerHTML = `
      <div class="summary-item">
        <span class="summary-label">鍒板</span>
        <span class="summary-value">${arrival}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">鍙敤鏃堕棿</span>
        <span class="summary-value">${hrs}灏忔椂${mins > 0 ? mins + '鍒? : ''}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">绮惧姏</span>
        <span class="summary-value">${energyLabel[state.energy]}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">鐩爣</span>
        <span class="summary-value">${goalConfig[state.goal]?.icon || ''} ${goalLabel}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">鍏ョ潯</span>
        <span class="summary-value">${sleepTime || '23:00'}</span>
      </div>
      <span class="summary-hint">${sceneLabels[state.scene]}</span>
    `;

    // Main blocks
    const blocksHtml = mainPlan.map((b, i) => {
      const subHtml = (b.sub && b.sub.length)
        ? `<div class="block-subtasks">
             <div class="subtasks-label">馃敟 浠婃櫄蹇呴』瀹屾垚</div>
             ${b.sub.map(t => `<div class="subtask-item"><span class="subtask-dot"></span>${t}</div>`).join('')}
           </div>`
        : '';
      return `
      <div class="plan-block ${b.type} ${i === 0 ? 'first' : ''}">
        <input type="checkbox" class="block-check" onclick="toggleBlockDone(this)" />
        ${i === 0 ? '<div class="first-badge">鈻?绗竴姝ワ紝浠庤繖閲屽紑濮?/div>' : ''}
        <div class="block-time">
          <span class="block-start">${b.time.start}</span>
          <span style="color:var(--text-dim)">鈫?/span>
          <span class="block-end">${b.time.end}</span>
          <span class="block-duration">${parseTime(b.time.end) - parseTime(b.time.start)}鍒嗛挓</span>
        </div>
        <div class="block-main">
          <span class="block-icon">${b.icon}</span>
          <span class="block-action">${b.action}</span>
        </div>
        <div class="block-meta">
          <span class="block-tag ${tagClass(b.type)}">${b.tag}</span>
        </div>
        <div class="block-desc">${b.desc}</div>
        ${subHtml}
      </div>
    `}).join('');

    document.getElementById('planBlocks').innerHTML = blocksHtml;

    // Low power blocks
    const lpHtml = lowPower.map(b => `
      <div class="lowpower-block">
        <input type="checkbox" class="block-check" onclick="toggleLowDone(this)" style="position:absolute;right:12px;top:10px;width:18px;height:18px;appearance:none;-webkit-appearance:none;border:2px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;" />
        <span class="lowpower-time">${b.time.start} 鈥?${b.time.end}</span>
        <span class="lowpower-action">${b.action}</span>
        <div class="lowpower-note">${b.note}</div>
      </div>
    `).join('');

    document.getElementById('lowpowerBlocks').innerHTML = lpHtml;

    // Reset lowpower toggle
    document.getElementById('lowpowerSection').classList.remove('visible');
    document.getElementById('lowpowerLabel').textContent = '绮惧姏涓嶆敮鏃剁殑淇濆簳鏂规';
  }

  function parseTime(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  /* 鈹€鈹€鈹€ TOGGLE LOW POWER 鈹€鈹€鈹€ */
  function toggleLowPower() {
    const sec = document.getElementById('lowpowerSection');
    const label = document.getElementById('lowpowerLabel');
    const isOpen = sec.classList.toggle('visible');
    label.textContent = isOpen ? '鏀惰捣淇濆簳鏂规 鈫? : '绮惧姏涓嶆敮鏃剁殑淇濆簳鏂规';
  }

  /* 鈹€鈹€鈹€ RESET 鈹€鈹€鈹€ */
  function resetForm() {
    document.getElementById('planView').classList.remove('visible');
    document.getElementById('formCard').classList.remove('hidden');
    document.getElementById('progressWrap').style.display = 'none';
    isCompact = false;
    document.getElementById('planView').classList.remove('compact-mode');
    document.getElementById('compactBtn').classList.remove('active');
    document.getElementById('compactBtn').textContent = '馃搻 绱у噾妯″紡';
  }

  /* 鈹€鈹€鈹€ COMPACT MODE 鈹€鈹€鈹€ */
  let isCompact = false;
  function toggleCompact() {
    isCompact = !isCompact;
    const view = document.getElementById('planView');
    const btn = document.getElementById('compactBtn');
    view.classList.toggle('compact-mode', isCompact);
    btn.classList.toggle('active', isCompact);
    btn.textContent = isCompact ? '馃搻 灞曞紑妯″紡' : '馃搻 绱у噾妯″紡';
  }

  /* 鈹€鈹€鈹€ BLOCK DESC TOGGLE (compact mode) 鈹€鈹€鈹€ */
  document.addEventListener('click', function(e) {
    if (!isCompact) return;
    const block = e.target.closest('.plan-block');
    if (!block) return;
    // Don't toggle if clicking checkbox or subtasks area
    if (e.target.closest('.block-check')) return;
    if (e.target.closest('.block-subtasks')) return;
    block.classList.toggle('desc-open');
  });

  /* 鈹€鈹€鈹€ CHECKBOX TOGGLE 鈹€鈹€鈹€ */
  function toggleBlockDone(cb) {
    const block = cb.closest('.plan-block');
    block.classList.toggle('done', cb.checked);
    updateProgress();
  }
  function toggleLowDone(cb) {
    const block = cb.closest('.lowpower-block');
    if (cb.checked) {
      block.style.opacity = '0.4';
      block.style.textDecoration = 'line-through';
      block.style.color = 'var(--text-dim)';
    } else {
      block.style.opacity = '1';
      block.style.textDecoration = 'none';
      block.style.color = '';
    }
    if (cb.style.cssText) {
      // Update checked style
      cb.style.background = cb.checked ? 'var(--accent-low)' : 'transparent';
      cb.style.borderColor = cb.checked ? 'var(--accent-low)' : 'var(--border)';
    }
  }

  /* 鈹€鈹€鈹€ PROGRESS BAR 鈹€鈹€鈹€ */
  function updateProgress() {
    const total = document.querySelectorAll('#planBlocks .plan-block').length;
    const done = document.querySelectorAll('#planBlocks .plan-block.done').length;
    const bar = document.getElementById('progressBar');
    if (!bar) return;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    bar.style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done}/${total}`;
  }
</script>
</body>
