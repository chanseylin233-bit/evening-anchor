<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evening Anchor — 给自己一个值得的夜晚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #0F0E17;
      --bg-card:     #1A1830;
      --bg-input:    #232140;
      --bg-hover:    #2D2B52;
      --accent-warm: #FFB86C;
      --accent-cool: #7AA2F7;
      --accent-low:  #9ECE6A;
      --accent-red:  #F7768E;
      --text-primary:#E8E6F0;
      --text-muted:  #8B87A3;
      --text-dim:    #565478;
      --border:      #2D2B4E;
      --glow-warm:   rgba(255,184,108,0.18);
      --glow-cool:   rgba(122,162,247,0.12);
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      right: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(255,184,108,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(122,162,247,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ─── HEADER ─── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease-out both;
    }
    .header-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.9;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.4rem;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ─── FORM CARD ─── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeUp 0.6s ease-out 0.1s both;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .form-card.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      display: none;
    }

    .field {
      margin-bottom: 28px;
    }
    .field:last-of-type { margin-bottom: 0; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field-label .emoji {
      font-size: 1rem;
      opacity: 0.85;
    }

    /* ─── TIME INPUT ─── */
    .time-input-wrap {
      position: relative;
    }
    .time-input-wrap input[type="time"] {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .time-input-wrap input[type="time"]:focus {
      border-color: var(--accent-warm);
      box-shadow: 0 0 0 3px var(--glow-warm);
    }
    .time-input-wrap input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }

    /* ─── TEXTAREA ─── */
    textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'LXGW Wen Kai', serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--text-dim); font-style: italic; }
    textarea:focus { border-color: var(--accent-warm); }

    /* ─── MUST-DO BLOCK ─── */
    .mustdo-block {
      background: rgba(255, 184, 108, 0.08);
      border: 1.5px solid rgba(255, 184, 108, 0.35);
      border-left: 3px solid var(--accent-warm);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .mustdo-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .mustdo-text {
      font-size: 1rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ─── SUBTASKS (主任务块内子项) ─── */
    .block-subtasks {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 184, 108, 0.3);
    }
    .subtasks-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .subtask-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.6;
      padding-left: 4px;
    }
    .subtask-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-warm);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* ─── BUTTON GROUP ─── */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-group.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .opt-btn {
      flex: 1;
      min-width: 70px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      user-select: none;
    }
    .opt-btn:hover {
      border-color: var(--text-dim);
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .opt-btn .opt-icon {
      font-size: 1.2rem;
      line-height: 1;
    }
    .opt-btn.selected {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: rgba(255,184,108,0.08);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2);
    }
    .opt-btn.selected-cool {
      border-color: var(--accent-cool);
      color: var(--accent-cool);
      background: rgba(122,162,247,0.08);
      box-shadow: 0 0 0 1px rgba(122,162,247,0.2);
    }
    .opt-btn .sub {
      font-size: 0.7rem;
      opacity: 0.65;
      font-weight: 400;
    }

    /* ─── CONDITIONAL ─── */
    .conditional-field {
      margin-top: 14px;
      display: none;
      animation: fadeUp 0.25s ease-out;
    }
    .conditional-field.visible { display: block; }

    /* ─── GENERATE BTN ─── */
    .generate-btn {
      width: 100%;
      margin-top: 32px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #e09a5a 0%, #ff9f45 50%, #f5a04a 100%);
      border: none;
      border-radius: 14px;
      color: #1a1000;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
    }
    .generate-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,184,108,0.35);
      filter: brightness(1.08);
    }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled {
      background: var(--bg-input);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }
    .generate-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26,16,0,0.3);
      border-top-color: #1a1000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .generate-btn.loading .spinner { display: block; }
    .generate-btn.loading .btn-text { opacity: 0.7; }

    /* ─── PLAN VIEW ─── */
    .plan-view {
      display: none;
      animation: fadeUp 0.5s ease-out;
    }
    .plan-view.visible {
      display: block;
    }

    .plan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease-out 0.05s both;
    }
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { border-color: var(--text-dim); color: var(--text-primary); }
    .plan-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── SUMMARY BAR ─── */
    .summary-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.5s ease-out 0.1s both;
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .summary-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .summary-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .summary-sep { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
    .summary-hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-left: auto;
      font-style: italic;
    }

    /* ─── PLAN BLOCKS ─── */
    .plan-blocks {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .plan-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-16px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, box-shadow 0.2s;
    }
    .plan-block.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .plan-block:hover {
      border-color: var(--text-dim);
    }

    /* Left accent bar */
    .plan-block::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent-warm);
    }
    .plan-block.easy::before { background: var(--accent-low); }
    .plan-block.focus::before { background: var(--accent-cool); }
    .plan-block.rest::before { background: #bb9af7; }

    /* First block — highlighted start */
    .plan-block.first {
      border-color: rgba(255,184,108,0.4);
      background: linear-gradient(135deg, rgba(255,184,108,0.06) 0%, var(--bg-card) 60%);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2), 0 4px 20px rgba(255,184,108,0.08);
    }
    .plan-block.first::before { background: var(--accent-warm); width: 4px; }

    .block-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .block-start { color: var(--accent-warm); font-weight: 500; }
    .block-end { color: var(--text-dim); }
    .block-duration {
      margin-left: 6px;
      padding: 1px 7px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
    }

    .block-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .block-icon { font-size: 1.1rem; }
    .block-action {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .first .block-action { color: var(--accent-warm); }

    .block-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .block-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }
    .block-tag.tag-easy { background: rgba(158,206,106,0.12); color: var(--accent-low); }
    .block-tag.tag-focus { background: rgba(122,162,247,0.12); color: var(--accent-cool); }
    .block-tag.tag-warm { background: rgba(255,184,108,0.12); color: var(--accent-warm); }
    .block-tag.tag-rest { background: rgba(187,154,247,0.12); color: #bb9af7; }
    .block-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* First step badge */
    .first-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,184,108,0.15);
      color: var(--accent-warm);
      border: 1px solid rgba(255,184,108,0.3);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.04em;
      animation: pulse-badge 2.5s ease-in-out infinite;
    }

    /* ─── LOW POWER VERSION ─── */
    .lowpower-toggle {
      margin-top: 20px;
      text-align: center;
    }
    .lowpower-trigger {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-dim);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .lowpower-trigger:hover {
      border-color: var(--text-muted);
      color: var(--text-muted);
      background: var(--bg-card);
    }
    .lowpower-section {
      margin-top: 12px;
      display: none;
      animation: fadeUp 0.3s ease-out;
    }
    .lowpower-section.visible { display: block; }

    .lowpower-header {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
      font-style: italic;
    }
    .lowpower-block {
      background: rgba(35,33,64,0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .lowpower-block.visible { opacity: 1; transform: translateY(0); }
    .lowpower-block::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-low);
      margin-right: 10px;
      vertical-align: middle;
    }
    .lowpower-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .lowpower-action {
      font-size: 0.92rem;
      color: var(--text-muted);
      display: inline;
      margin-left: 8px;
    }
    .lowpower-note {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      padding-left: 14px;
      font-style: italic;
    }

    /* ─── FOOTER HINT ─── */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 28px;
      font-style: italic;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-badge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,108,0.0); }
      50% { box-shadow: 0 0 0 6px rgba(255,184,108,0.12); }
    }

    /* ─── DIVIDER ─── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Selection */
    ::selection { background: rgba(255,184,108,0.2); color: var(--text-primary); }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <svg class="header-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="22" stroke="#FFB86C" stroke-width="1.5" stroke-opacity="0.4"/>
      <path d="M24 10C24 10 16 18 16 26C16 30.4183 19.5817 34 24 34C28.4183 34 32 30.4183 32 26C32 18 24 10 24 10Z" fill="#FFB86C" fill-opacity="0.2" stroke="#FFB86C" stroke-width="1.5"/>
      <circle cx="24" cy="26" r="4" fill="#FFB86C" fill-opacity="0.7"/>
      <line x1="24" y1="6" x2="24" y2="10" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="38" x2="24" y2="42" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="26" x2="10" y2="26" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="26" x2="42" y2="26" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Evening Anchor</h1>
    <p>给自己一个值得的夜晚</p>
  </header>

  <!-- FORM -->
  <div class="form-card" id="formCard">
    <div class="field">
      <div class="field-label"><span class="emoji">🕐</span>下班到家时间</div>
      <div class="time-input-wrap">
        <input type="time" id="arrivalTime" value="19:30" />
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">⚡</span>当前精力状态</div>
      <div class="btn-group" id="energyGroup">
        <button class="opt-btn" data-value="low" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🪫</span>
          <span>低</span>
          <span class="sub">疲惫</span>
        </button>
        <button class="opt-btn selected" data-value="mid" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🟡</span>
          <span>中</span>
          <span class="sub">一般</span>
        </button>
        <button class="opt-btn" data-value="high" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🔋</span>
          <span>高</span>
          <span class="sub">充沛</span>
        </button>
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">🍽️</span>晚餐安排</div>
      <div class="btn-group" id="sceneGroup">
        <button class="opt-btn selected-cool" data-value="alone" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">🍜</span>
          <span>独自用餐</span>
        </button>
        <button class="opt-btn" data-value="couple" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">💑</span>
          <span>和伴侣吃</span>
        </button>
        <button class="opt-btn" data-value="parents" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">🏠</span>
          <span>回父母家吃</span>
        </button>
      </div>
      <div class="conditional-field" id="parentsReturnField">
        <div style="margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span style="font-size:0.8rem; color:var(--text-muted); white-space:nowrap;">出发时间</span>
          <input type="time" id="parentsReturnTime" value="18:30"
            style="width:120px; background:var(--bg-input);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:0.95rem;color:var(--text-primary);outline:none;"
            onfocus="this.style.borderColor='var(--accent-warm)'"
            onblur="this.style.borderColor='var(--border)'">
          <span style="font-size:0.78rem; color:var(--text-dim);">出门去父母家的时间</span>
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">🎯</span>今晚主目标</div>
      <div class="btn-group" id="goalGroup">
        <button class="opt-btn" data-value="rest" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🛋️</span>
          <span>休息</span>
        </button>
        <button class="opt-btn selected-cool" data-value="productivity" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">📋</span>
          <span>生产力</span>
        </button>
        <button class="opt-btn" data-value="social" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">💬</span>
          <span>社交</span>
        </button>
        <button class="opt-btn" data-value="hobby" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🎨</span>
          <span>爱好</span>
        </button>
        <button class="opt-btn" data-value="health" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🏃</span>
          <span>健康</span>
        </button>
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">⏰</span>明日重要事项</div>
      <div class="btn-group two-col" id="tomorrowGroup">
        <button class="opt-btn" data-value="none" onclick="selectOpt(this,'tomorrow')">
          <span class="opt-icon">🈚</span>
          <span>无</span>
        </button>
        <button class="opt-btn" data-value="has" onclick="selectOpt(this,'tomorrow')">
          <span class="opt-icon">📌</span>
          <span>有</span>
        </button>
      </div>
      <div class="conditional-field" id="tomorrowTimeField">
        <div style="margin-top:10px;">
          <input type="time" id="tomorrowTime" value="08:00" style="width:100%;background:var(--bg-input);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--text-primary);outline:none;" onfocus="this.style.borderColor='var(--accent-warm)'" onblur="this.style.borderColor='var(--border)'">
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">🔥</span>今晚必须完成的事</div>
      <textarea id="mustDoInput" rows="3" placeholder="例如：写完项目报告初稿、给妈妈打电话、还信用卡……&#10;也可以留空"></textarea>
    </div>

    <div class="field">
      <div class="field-label"><span class="emoji">🌙</span>预计入睡时间</div>
      <div class="time-input-wrap">
        <input type="time" id="sleepTimeInput" value="23:00" />
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generatePlan()">
      <span class="btn-text">生成我的晚间计划 →</span>
      <span class="spinner"></span>
    </button>
  </div>

  <!-- PLAN VIEW -->
  <div class="plan-view" id="planView">
    <div class="plan-header">
      <button class="back-btn" onclick="resetForm()">← 重新填写</button>
      <div class="plan-title">📋 今晚安排</div>
    </div>

    <div class="summary-bar" id="summaryBar">
      <!-- filled by JS -->
    </div>

    <div class="plan-blocks" id="planBlocks">
      <!-- filled by JS -->
    </div>

    <div class="lowpower-toggle">
      <button class="lowpower-trigger" id="lowpowerToggle" onclick="toggleLowPower()">
        <span>🔋</span>
        <span id="lowpowerLabel">精力不支时的保底方案</span>
      </button>
      <div class="lowpower-section" id="lowpowerSection">
        <div class="lowpower-header">当今晚感觉撑不住时，打开这个清单，只需要照做</div>
        <div id="lowpowerBlocks"></div>
      </div>
    </div>

    <div class="footer-note">照着第一步开始，其他的会自动到来 🌙</div>
  </div>

</div>

<script>
  /* ─── STATE ─── */
  const state = {
    energy: 'mid',
    scene: 'alone',
    goal: 'productivity',
    tomorrow: 'none',
    tomorrowTime: '08:00',
    mustDo: '',
    sleepTime: '23:00'
  };

  /* ─── SELECT OPTION ─── */
  function selectOpt(el, group) {
    const parent = el.parentElement;
    parent.querySelectorAll('.opt-btn').forEach(b => {
      b.classList.remove('selected', 'selected-cool');
    });
    el.classList.add(group === 'scene' || group === 'goal' ? 'selected-cool' : 'selected');
    state[group] = el.dataset.value;

    if (group === 'tomorrow') {
      document.getElementById('tomorrowTimeField').classList.toggle('visible', state.tomorrow === 'has');
    }
    if (group === 'scene') {
      document.getElementById('parentsReturnField').classList.toggle('visible', state.scene === 'parents');
    }
  }

  /* ─── ADD MINUTES TO TIME ─── */
  function addMinutes(timeStr, mins) {
    const [h, m] = timeStr.split(':').map(Number);
    const totalMins = h * 60 + m + mins;
    const nh = Math.floor(totalMins / 60) % 24;
    const nm = totalMins % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }

  /* ─── TIME RANGE LABEL ─── */
  function timeRange(start, mins) {
    const end = addMinutes(start, mins);
    return { start, end };
  }

  /* ─── GOAL CONFIG ─── */
  const goalConfig = {
    rest: {
      icon: '🛋️', label: '休息',
      mainLabel: '放松身心',
      blocks: (start, E) => []
    },
    productivity: {
      icon: '📋', label: '生产力',
      mainLabel: '专注任务',
      blocks: (start, E) => []
    },
    social: {
      icon: '💬', label: '社交',
      mainLabel: '社交连接',
      blocks: (start, E) => []
    },
    hobby: {
      icon: '🎨', label: '爱好',
      mainLabel: '投入爱好',
      blocks: (start, E) => []
    },
    health: {
      icon: '🏃', label: '健康',
      mainLabel: '身心锻炼',
      blocks: (start, E) => []
    }
  };

  /* ─── SCENE LABELS ─── */
  const sceneLabels = { alone: '独自用餐', couple: '和伴侣吃', parents: '回父母家吃' };

  /* ─── PLAN BUILDER ─── */
  function buildPlan(arrival, energy, scene, goal, tomorrow, parentsReturnTime, mustDo, sleepTime) {
    const blocks = [];
    let cursor = arrival; // 'HH:MM'
    const totalMins = (h, m) => h * 60 + m;
    const [ah, am] = arrival.split(':').map(Number);
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalAvail = totalMins(sh, sm) - totalMins(ah, am);

    const isLow = energy === 'low';
    const isHigh = energy === 'high';
    const isMid = energy === 'mid';
    const hasTomorrow = tomorrow === 'has';

    // ── BLOCK 1: Unwind (always first, < 5min) ──
    const u1 = timeRange(cursor, 5);
    blocks.push({
      time: u1, icon: '👋', action: '换衣服 + 收好随身物品', type: 'easy',
      tag: '轻松', desc: '脱掉上班装，换上居家服，把包放好。立刻进入家的状态。',
      isFirst: true
    });
    cursor = u1.end;

    // ── BLOCK 2: Quick reset ──
    const u2 = timeRange(cursor, 5);
    blocks.push({
      time: u2, icon: '💧', action: '喝杯水 + 简单整理', type: 'easy',
      tag: '轻松', desc: '补充水分，顺手把桌面/沙发收拾一下。',
      isFirst: false
    });
    cursor = u2.end;

    // ── BLOCK 3: Dinner (scene-aware) ──
    if (scene === 'parents' && parentsReturnTime) {
      const [rh, rm] = parentsReturnTime.split(':').map(Number);
      const [ah, am] = arrival.split(':').map(Number);
      const homeMins = rh * 60 + rm - (ah * 60 + am);

      if (homeMins >= 10) {
        const prep = timeRange(cursor, 10);
        blocks.push({
          time: prep, icon: '👋', action: '换衣服 + 收拾东西', type: 'easy',
          tag: '准备', desc: '换上干净衣服，带上给爸妈的东西',
          isFirst: false
        });
        cursor = prep.end;
      }
      if (homeMins >= 30) {
        const snack = timeRange(cursor, Math.min(15, homeMins - 20));
        blocks.push({
          time: snack, icon: '🍽️', action: '在家先垫一点', type: 'easy',
          tag: '补充能量', desc: '时间充裕的话先吃点，不用饿着去父母家',
          isFirst: false
        });
        cursor = snack.end;
      }
      if (homeMins >= 5) {
        const depart = timeRange(parentsReturnTime, 10);
        blocks.push({
          time: depart, icon: '🚗', action: '出发去父母家', type: 'easy',
          tag: '出发', desc: '带上给爸妈的东西，出发',
          isFirst: false
        });
        cursor = depart.end;
      }
      const parentsDinner = timeRange(cursor, 90);
      blocks.push({
        time: parentsDinner, icon: '🍽️', action: '在父母家吃饭', type: 'warm',
        tag: '家庭时光', desc: '和爸妈一起吃饭、聊天。放下手机，好好陪他们',
        isFirst: false
      });
      cursor = parentsDinner.end;
      const backHome = timeRange(cursor, 10);
      blocks.push({
        time: backHome, icon: '🏠', action: '回自己家', type: 'easy',
        tag: '回家', desc: '安全到家，简单收拾一下',
        isFirst: false
      });
      cursor = backHome.end;
    } else if (scene === 'couple') {
      const d1 = timeRange(cursor, 35);
      blocks.push({
        time: d1, icon: '🍽️', action: '和伴侣一起做/吃晚餐', type: 'easy',
        tag: '陪伴', desc: '一起做饭或者叫外卖，边吃边聊聊天',
        isFirst: false
      });
      cursor = d1.end;
    } else {
      const d1 = timeRange(cursor, isLow ? 20 : (isHigh ? 40 : 30));
      blocks.push({
        time: d1, icon: '🍽️', action: '独自用餐', type: 'easy',
        tag: '补充能量', desc: '不要刷手机，好好吃饭。可以配点音乐或播客',
        isFirst: false
      });
      cursor = d1.end;
    }

    // ── BUFFER ──
    const buf1 = timeRange(cursor, 10);
    blocks.push({
      time: buf1, icon: '⏸', action: '缓冲休息', type: 'rest',
      tag: '过渡', desc: '坐着发会儿呆，让身体从"工作模式"切换出来',
      isFirst: false
    });
    cursor = buf1.end;

    // ── MAIN GOAL BLOCKS ──
    if (goal === 'productivity') {
      if (isHigh) {
        const b1 = timeRange(cursor, 90);
        blocks.push({
          time: b1, icon: '📋', action: '深度工作时段', type: 'focus',
          tag: '专注', desc: '关掉通知，专注做最重要的1-2件事。按番茄钟节奏来。',
          sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [],
          isFirst: false
        });
        cursor = b1.end;
        const b1buf = timeRange(cursor, 10);
        blocks.push({ time: b1buf, icon: '☕', action: '短暂休息', type: 'rest', tag: '放松', desc: '站起来走动，伸展一下，喝点水', isFirst: false });
        cursor = b1buf.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 45);
        blocks.push({
          time: b1, icon: '📋', action: '整理 + 轻量任务', type: 'warm',
          tag: '适度', desc: '处理积压消息、整理待办清单、完成1件小事',
          sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [],
          isFirst: false
        });
        cursor = b1.end;
      }
      // 低精力：跳过生产力，直接休息
    }

    if (goal === 'health') {
      if (isHigh) {
        const b1 = timeRange(cursor, 45);
        blocks.push({ time: b1, icon: '🏃', action: '运动时间', type: 'focus', tag: '活力', desc: '跑步/健身/瑜伽，选一个动起来', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 25);
        blocks.push({ time: b1, icon: '🧘', action: '轻度活动', type: 'warm', tag: '适度', desc: '散步、拉伸或室内简单活动', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'hobby') {
      if (isHigh) {
        const b1 = timeRange(cursor, 60);
        blocks.push({ time: b1, icon: '🎨', action: '沉浸爱好时间', type: 'focus', tag: '专注', desc: '画画、乐器、读书、写作——给自己一段不被打扰的时间', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else if (isMid) {
        const b1 = timeRange(cursor, 30);
        blocks.push({ time: b1, icon: '🎨', action: '随手创作', type: 'warm', tag: '适度', desc: '做一点就好，不需要完整作品', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'social') {
      if (isHigh || isMid) {
        const b1 = timeRange(cursor, 60);
        blocks.push({ time: b1, icon: '💬', action: scene === 'parents' ? '与父母通话' : (scene === 'couple' ? '和伴侣聊天' : '联系朋友'), type: 'warm', tag: '连接', desc: scene === 'parents' ? '给爸妈打个电话' : (scene === 'couple' ? '两个人好好聊聊天' : '视频/语音/消息联系一下'), sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    if (goal === 'rest') {
      if (isLow) {
        const b1 = timeRange(cursor, 50);
        blocks.push({ time: b1, icon: '🎬', action: '无脑娱乐时间', type: 'rest', tag: '放松', desc: '刷剧/综艺/视频，不动脑子，纯放松', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      } else {
        const b1 = timeRange(cursor, 45);
        blocks.push({ time: b1, icon: '🎬', action: '放空娱乐', type: 'rest', tag: '休息', desc: '选一个轻松的节目，让自己彻底放松', sub: mustDo ? mustDo.trim().split(/[,，\n]+/).map(t=>t.trim()).filter(Boolean) : [], isFirst: false });
        cursor = b1.end;
      }
    }

    // ── EVENING WIND DOWN ──
    const windDownMins = isLow ? 30 : 45;
    const w1 = timeRange(cursor, windDownMins);
    blocks.push({
      time: w1, icon: '🌙', action: '晚间放松时光', type: 'rest',
      tag: '减压', desc: isLow ? '躺着听音乐、翻翻手机、什么都不想' : '洗漱 + 放松阅读/轻度浏览',
      isFirst: false
    });
    cursor = w1.end;

    // ── TOMORROW PREP ──
    if (hasTomorrow) {
      const p1 = timeRange(cursor, 15);
      blocks.push({
        time: p1, icon: '📌', action: '明日准备', type: 'easy',
        tag: '收尾', desc: '整理背包、确认闹钟、列出明天最重要的3件事',
        isFirst: false
      });
      cursor = p1.end;
    }

    // ── BEDTIME ROUTINE ──
    const remaining = totalMins(sh, sm) - totalMins(...cursor.split(':').map(Number));
    if (remaining > 0) {
      const bedMins = Math.min(remaining, 20);
      const bed1 = timeRange(cursor, bedMins);
      blocks.push({
        time: bed1, icon: '🛁', action: '睡前仪式', type: 'rest',
        tag: '收尾', desc: '洗漱、关灯、写3件今天满意的事（可选）',
        isFirst: false
      });
      cursor = bed1.end;
    }

    return blocks;
  }

  /* ─── LOW POWER PLAN ─── */
  function buildLowPowerPlan(arrival, sleepTime) {
    const blocks = [];
    let cursor = arrival;
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalMins = (h, m) => h * 60 + m;

    const b1 = timeRange(cursor, 5);
    blocks.push({ time: b1, action: '换衣服、坐下', note: '不需要做任何事，只是换好衣服' });
    cursor = b1.end;

    const b2 = timeRange(cursor, 20);
    blocks.push({ time: b2, action: '简单吃点东西', note: '热一碗汤、吃点水果，不要勉强做饭' });
    cursor = b2.end;

    const b3 = timeRange(cursor, 30);
    blocks.push({ time: b3, action: '躺着或坐着，随便干什么', note: '看手机、听歌、什么都不干都行' });
    cursor = b3.end;

    const b4 = timeRange(cursor, 15);
    blocks.push({ time: b4, action: '简单洗漱', note: '刷牙、洗脸就够了' });
    cursor = b4.end;

    const b5 = timeRange(cursor, 10);
    blocks.push({ time: b5, action: '关灯，躺下', note: '睡不着也没关系，躺着就是休息' });
    cursor = b5.end;

    return blocks;
  }

  /* ─── TAG CLASS ─── */
  function tagClass(type) {
    const map = { easy: 'tag-easy', focus: 'tag-focus', warm: 'tag-warm', rest: 'tag-rest' };
    return map[type] || '';
  }

  /* ─── GENERATE ─── */
  function generatePlan() {
    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      const arrival = document.getElementById('arrivalTime').value;
      const sleepTime = document.getElementById('sleepTimeInput').value;
      const mustDo = document.getElementById('mustDoInput').value;
      const parentsReturnTime = state.scene === 'parents'
        ? document.getElementById('parentsReturnTime').value
        : null;
      const mainPlan = buildPlan(arrival, state.energy, state.scene, state.goal, state.tomorrow, parentsReturnTime, mustDo, sleepTime);
      const lowPower = buildLowPowerPlan(arrival, sleepTime);

      renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo);

      document.getElementById('formCard').classList.add('hidden');
      document.getElementById('planView').classList.add('visible');
      btn.classList.remove('loading');
      btn.disabled = false;

      // Stagger blocks
      document.querySelectorAll('.plan-block').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 120);
      });

      // Low power blocks stagger
      setTimeout(() => {
        document.querySelectorAll('.lowpower-block').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 80);
        });
      }, mainPlan.length * 120 + 300);
    }, 900);
  }

  /* ─── RENDER PLAN ─── */
  function renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo) {
    // Summary
    const [ah, am] = arrival.split(':').map(Number);
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalMins = (sh * 60 + sm) - (ah * 60 + am);
    const hrs = Math.floor(totalMins / 60);
    const mins = totalMins % 60;
    const energyLabel = { low: '🪫 低', mid: '🟡 中', high: '🔋 高' };
    const goalLabel = goalConfig[state.goal]?.label || state.goal;

    document.getElementById('summaryBar').innerHTML = `
      <div class="summary-item">
        <span class="summary-label">到家</span>
        <span class="summary-value">${arrival}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">可用时间</span>
        <span class="summary-value">${hrs}小时${mins > 0 ? mins + '分' : ''}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">精力</span>
        <span class="summary-value">${energyLabel[state.energy]}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">目标</span>
        <span class="summary-value">${goalConfig[state.goal]?.icon || ''} ${goalLabel}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">入睡</span>
        <span class="summary-value">${sleepTime || '23:00'}</span>
      </div>
      <span class="summary-hint">${sceneLabels[state.scene]}</span>
    `;

    // Main blocks
    const blocksHtml = mainPlan.map((b, i) => {
      const subHtml = (b.sub && b.sub.length)
        ? `<div class="block-subtasks">
             <div class="subtasks-label">🔥 今晚必须完成</div>
             ${b.sub.map(t => `<div class="subtask-item"><span class="subtask-dot"></span>${t}</div>`).join('')}
           </div>`
        : '';
      return `
      <div class="plan-block ${b.type} ${i === 0 ? 'first' : ''}">
        ${i === 0 ? '<div class="first-badge">▶ 第一步，从这里开始</div>' : ''}
        <div class="block-time">
          <span class="block-start">${b.time.start}</span>
          <span style="color:var(--text-dim)">→</span>
          <span class="block-end">${b.time.end}</span>
          <span class="block-duration">${parseTime(b.time.end) - parseTime(b.time.start)}分钟</span>
        </div>
        <div class="block-main">
          <span class="block-icon">${b.icon}</span>
          <span class="block-action">${b.action}</span>
        </div>
        <div class="block-meta">
          <span class="block-tag ${tagClass(b.type)}">${b.tag}</span>
        </div>
        <div class="block-desc">${b.desc}</div>
        ${subHtml}
      </div>
    `}).join('');

    document.getElementById('planBlocks').innerHTML = blocksHtml;

    // Low power blocks
    const lpHtml = lowPower.map(b => `
      <div class="lowpower-block">
        <span class="lowpower-time">${b.time.start} – ${b.time.end}</span>
        <span class="lowpower-action">${b.action}</span>
        <div class="lowpower-note">${b.note}</div>
      </div>
    `).join('');

    document.getElementById('lowpowerBlocks').innerHTML = lpHtml;

    // Reset lowpower toggle
    document.getElementById('lowpowerSection').classList.remove('visible');
    document.getElementById('lowpowerLabel').textContent = '精力不支时的保底方案';
  }

  function parseTime(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  /* ─── TOGGLE LOW POWER ─── */
  function toggleLowPower() {
    const sec = document.getElementById('lowpowerSection');
    const label = document.getElementById('lowpowerLabel');
    const isOpen = sec.classList.toggle('visible');
    label.textContent = isOpen ? '收起保底方案 ↑' : '精力不支时的保底方案';
  }

  /* ─── RESET ─── */
  function resetForm() {
    document.getElementById('planView').classList.remove('visible');
    document.getElementById('formCard').classList.remove('hidden');
  }
</script>
</body>
</html>
