<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FDF6EC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="晚间锚点">
  <meta name="description" content="你的晚间安排生成器，下班到家直接执行">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.svg">
  <link rel="icon" href="./icon-192.svg" type="image/svg+xml">
  <title>Evening Anchor — 给自己一个值得的夜晚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #0F0E17;
      --bg-card:     #1A1830;
      --bg-input:    #232140;
      --bg-hover:    #2D2B52;
      --accent-warm: #FFB86C;
      --accent-cool: #7AA2F7;
      --accent-low:  #9ECE6A;
      --accent-red:  #F7768E;
      --text-primary:#E8E6F0;
      --text-muted:  #8B87A3;
      --text-dim:    #565478;
      --border:      #2D2B4E;
      --glow-warm:   rgba(255,184,108,0.18);
      --glow-cool:   rgba(122,162,247,0.12);
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      right: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(255,184,108,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(122,162,247,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ─── HEADER ─── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease-out both;
    }
    .header-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      opacity: 0.9;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 2.4rem;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ─── FORM CARD ─── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      animation: fadeUp 0.6s ease-out 0.1s both;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .form-card.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      display: none;
    }

    .field {
      margin-bottom: 28px;
    }
    .field:last-of-type { margin-bottom: 0; }

    .field-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field-label .emoji {
      font-size: 1rem;
      opacity: 0.85;
    }

    /* ─── TIME INPUT ─── */
    .time-input-wrap {
      position: relative;
    }
    .time-input-wrap input[type="time"] {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .time-input-wrap input[type="time"]:focus {
      border-color: var(--accent-warm);
      box-shadow: 0 0 0 3px var(--glow-warm);
    }
    .time-input-wrap input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }

    /* ─── TEXTAREA ─── */
    textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'LXGW Wen Kai', serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--text-dim); font-style: italic; }
    textarea:focus { border-color: var(--accent-warm); }

    /* ─── MUST-DO BLOCK ─── */
    .mustdo-block {
      background: rgba(255, 184, 108, 0.08);
      border: 1.5px solid rgba(255, 184, 108, 0.35);
      border-left: 3px solid var(--accent-warm);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .mustdo-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .mustdo-text {
      font-size: 1rem;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ─── SUBTASKS (主任务块内子项) ─── */
    .block-subtasks {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 184, 108, 0.3);
    }
    .subtasks-label {
      font-size: 0.72rem;
      color: var(--accent-warm);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .subtask-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.6;
      padding-left: 4px;
    }
    .subtask-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-warm);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* ─── BUTTON GROUP ─── */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-group.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #goalGroup { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    #goalGroup .opt-btn { min-width: 0; }

    .opt-btn {
      flex: 1;
      min-width: 70px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      user-select: none;
    }
    .opt-btn:hover {
      border-color: var(--text-dim);
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .opt-btn .opt-icon {
      font-size: 1.2rem;
      line-height: 1;
    }
    .opt-btn.selected {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
      background: rgba(255,184,108,0.08);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2);
    }
    .opt-btn.selected-cool {
      border-color: var(--accent-cool);
      color: var(--accent-cool);
      background: rgba(122,162,247,0.08);
      box-shadow: 0 0 0 1px rgba(122,162,247,0.2);
    }
    .opt-btn .sub {
      font-size: 0.7rem;
      opacity: 0.65;
      font-weight: 400;
    }

    /* ─── COMPACT BTN GROUP (energy, tomorrow) ─── */
    .energy-group,
    .compact-group {
      flex-direction: row;
      align-items: center;
    }
    .energy-group .opt-btn,
    .compact-group .opt-btn {
      flex-direction: row;
      padding: 8px 14px;
      gap: 6px;
      border-radius: 8px;
      min-width: auto;
    }
    .energy-group .opt-icon,
    .compact-group .opt-icon {
      font-size: 1rem;
    }
    .energy-group .opt-icon {
      display: inline-block;
      transform: rotate(-90deg);
    }
    .energy-group .opt-text,
    .compact-group .opt-text {
      font-size: 0.85rem;
      font-weight: 500;
    }
    .energy-group .sub,
    .compact-group .sub { display: none; }

    /* ─── CONDITIONAL ─── */
    .conditional-field {
      margin-top: 14px;
      display: none;
      animation: fadeUp 0.25s ease-out;
    }
    .conditional-field.visible { display: block; }

    /* ─── GENERATE BTN ─── */
    .generate-btn {
      width: 100%;
      margin-top: 32px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #e09a5a 0%, #ff9f45 50%, #f5a04a 100%);
      border: none;
      border-radius: 14px;
      color: #1a1000;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.03em;
      position: relative;
      overflow: hidden;
    }
    .generate-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,184,108,0.35);
      filter: brightness(1.08);
    }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled {
      background: var(--bg-input);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }
    .generate-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(26,16,0,0.3);
      border-top-color: #1a1000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .generate-btn.loading .spinner { display: block; }
    .generate-btn.loading .btn-text { opacity: 0.7; }

    /* ─── PLAN VIEW ─── */
    .plan-view {
      display: none;
      animation: fadeUp 0.5s ease-out;
    }
    .plan-view.visible {
      display: block;
    }

    .plan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease-out 0.05s both;
    }
    .back-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { border-color: var(--text-dim); color: var(--text-primary); }
    .plan-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .copy-btn:hover { border-color: var(--accent-warm); color: var(--accent-warm); }
    .copy-btn.copied { border-color: var(--accent-low); color: var(--accent-low); }

    /* ─── LATE NIGHT MODE ─── */
    .late-night-banner {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      line-height: 1.6;
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      animation: fadeSlideIn 0.4s ease;
    }
    .late-night-banner .ln-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: #FFD93D;
    }
    .late-night-banner .ln-hint {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .late-night-dismiss {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      margin-left: auto;
      flex-shrink: 0;
    }
    .late-night-dismiss:hover { border-color: #FFD93D; color: #FFD93D; }
    .field.late-hidden { display: none; }
    .field.late-dimmed { opacity: 0.5; pointer-events: none; }

    /* ─── CELEBRATION ─── */
    #confettiCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }
    .celebrate-toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      background: linear-gradient(135deg, #FFD93D 0%, #FF6B6B 100%);
      color: #fff;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      padding: 20px 36px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(255,107,107,0.35);
      z-index: 10000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      text-align: center;
      max-width: 88vw;
    }
    .celebrate-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ─── LIVE BAR ─── */
    .live-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0 16px;
      font-family: 'JetBrains Mono', monospace;
      animation: fadeUp 0.4s ease-out 0.1s both;
    }
    .live-clock {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }
    .live-countdown {
      font-size: 0.78rem;
      color: var(--accent-warm);
      background: rgba(255,184,108,0.1);
      padding: 3px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .live-countdown.idle { color: var(--text-dim); background: rgba(255,255,255,0.04); }

    /* ─── CURRENT BLOCK HIGHLIGHT ─── */
    .plan-block.current {
      border-color: var(--accent-warm);
      box-shadow: 0 0 0 2px rgba(255,184,108,0.25), 0 4px 20px rgba(255,184,108,0.1);
    }
    .plan-block.current::before {
      background: var(--accent-warm);
      width: 4px;
    }
    .plan-block.current .block-action {
      color: var(--accent-warm);
    }
    .plan-block.past {
      opacity: 0.45;
    }

    /* ─── SUMMARY BAR ─── */
    .summary-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      animation: fadeUp 0.5s ease-out 0.1s both;
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .summary-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .summary-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .summary-sep { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
    .summary-hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-left: auto;
      font-style: italic;
      min-width: 0;
    }

    /* ─── PLAN BLOCKS ─── */
    .plan-blocks {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .plan-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-16px);
      transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, box-shadow 0.2s;
    }
    .plan-block.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .plan-block:hover {
      border-color: var(--text-dim);
    }

    /* Left accent bar */
    .plan-block::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent-warm);
    }
    .plan-block.easy::before { background: var(--accent-low); }
    .plan-block.focus::before { background: var(--accent-cool); }
    .plan-block.rest::before { background: #bb9af7; }

    /* First block — highlighted start */
    .plan-block.first {
      border-color: rgba(255,184,108,0.4);
      background: linear-gradient(135deg, rgba(255,184,108,0.06) 0%, var(--bg-card) 60%);
      box-shadow: 0 0 0 1px rgba(255,184,108,0.2), 0 4px 20px rgba(255,184,108,0.08);
    }
    .plan-block.first::before { background: var(--accent-warm); width: 4px; }

    .block-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .block-start { color: var(--accent-warm); font-weight: 500; }
    .block-end { color: var(--text-dim); }
    .block-duration {
      margin-left: 6px;
      padding: 1px 7px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Noto Sans SC', sans-serif;
    }

    /* ─── CHECKBOX ─── */
    .block-check {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 22px;
      height: 22px;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-check:hover {
      border-color: var(--accent-warm);
      background: rgba(255,184,108,0.05);
    }
    .block-check:checked {
      background: var(--accent-warm);
      border-color: var(--accent-warm);
    }
    .block-check:checked::after {
      content: '✓';
      color: #1a1000;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    /* Completed state */
    .plan-block.done {
      opacity: 0.5;
    }
    .plan-block.done .block-action {
      text-decoration: line-through;
      text-decoration-color: var(--text-dim);
      color: var(--text-muted);
    }
    .plan-block.done .block-icon { opacity: 0.5; }
    .plan-block.done .block-desc { display: none; }
    .plan-block.done .block-subtasks { display: none; }
    .plan-block.done .block-time .block-start { color: var(--text-dim); }
    .plan-block.done .first-badge { display: none; }
    .plan-block.done::before { background: var(--text-dim); }

    .block-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
      padding-right: 32px;
    }
    .block-icon { font-size: 1.1rem; }
    .block-action {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      transition: color 0.25s, text-decoration 0.25s;
    }
    .first .block-action { color: var(--accent-warm); }

    .block-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .block-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }
    .block-tag.tag-easy { background: rgba(158,206,106,0.12); color: var(--accent-low); }
    .block-tag.tag-focus { background: rgba(122,162,247,0.12); color: var(--accent-cool); }
    .block-tag.tag-warm { background: rgba(255,184,108,0.12); color: var(--accent-warm); }
    .block-tag.tag-rest { background: rgba(187,154,247,0.12); color: #bb9af7; }
    .block-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* First step badge */
    .first-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,184,108,0.15);
      color: var(--accent-warm);
      border: 1px solid rgba(255,184,108,0.3);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.04em;
      animation: pulse-badge 2.5s ease-in-out infinite;
    }

    /* ─── LOW POWER VERSION ─── */
    .lowpower-toggle {
      margin-top: 20px;
      text-align: center;
    }
    .lowpower-trigger {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-dim);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .lowpower-trigger:hover {
      border-color: var(--text-muted);
      color: var(--text-muted);
      background: var(--bg-card);
    }
    .lowpower-section {
      margin-top: 12px;
      display: none;
      animation: fadeUp 0.3s ease-out;
    }
    .lowpower-section.visible { display: block; }

    .lowpower-header {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
      font-style: italic;
    }
    .lowpower-block {
      background: rgba(35,33,64,0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      position: relative;
    }
    .lowpower-block.visible { opacity: 1; transform: translateY(0); }
    .lowpower-block::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-low);
      margin-right: 10px;
      vertical-align: middle;
    }
    .lowpower-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .lowpower-action {
      font-size: 0.92rem;
      color: var(--text-muted);
      display: inline;
      margin-left: 8px;
    }
    .lowpower-note {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      padding-left: 14px;
      font-style: italic;
    }

    /* ─── FOOTER HINT ─── */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 28px;
      font-style: italic;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-badge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,108,0.0); }
      50% { box-shadow: 0 0 0 6px rgba(255,184,108,0.12); }
    }

    /* ─── DIVIDER ─── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 16px;
      color: var(--text-dim);
      font-size: 0.75rem;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── MOBILE COMPACT MODE ─── */
    .compact-toggle {
      display: none;
      margin-bottom: 16px;
      text-align: center;
    }
    .compact-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--text-muted);
      font-size: 0.76rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .compact-btn:hover { border-color: var(--text-dim); color: var(--text-primary); }
    .compact-btn.active { border-color: var(--accent-cool); color: var(--accent-cool); background: rgba(122,162,247,0.08); }

    /* Mobile responsive — compact adjustments */
    @media (max-width: 600px) {
      .container { padding: 28px 14px 60px; }
      .header { margin-bottom: 28px; }
      .header h1 { font-size: 1.8rem; }
      .form-card { padding: 22px 18px; border-radius: 16px; }
      .field { margin-bottom: 22px; }
      .generate-btn { padding: 14px 20px; margin-top: 24px; border-radius: 12px; }

      .compact-toggle { display: block; }

      /* ── Compact block layout ── */
      .compact-mode .plan-block {
        padding: 12px 14px;
        border-radius: 10px;
      }
      .compact-mode .plan-block.first {
        padding: 12px 14px;
      }
      .compact-mode .block-check {
        width: 18px;
        height: 18px;
        right: 12px;
        top: 12px;
        border-radius: 5px;
      }
      .compact-mode .block-check:checked::after {
        font-size: 11px;
      }
      .compact-mode .block-main {
        padding-right: 28px;
      }
      .compact-mode .first-badge {
        display: inline-flex;
        margin-bottom: 4px;
        padding: 2px 8px;
        font-size: 0.65rem;
        animation: none;
      }
      .compact-mode .block-time {
        margin-bottom: 0;
        font-size: 0.68rem;
      }
      .compact-mode .block-start { font-size: 0.68rem; }
      .compact-mode .block-duration { font-size: 0.62rem; padding: 0 5px; }
      .compact-mode .block-main {
        margin-bottom: 2px;
        gap: 6px;
      }
      .compact-mode .block-icon { font-size: 0.95rem; }
      .compact-mode .block-action {
        font-size: 1.05rem;
        line-height: 1.2;
      }
      .compact-mode .block-meta { gap: 6px; }
      .compact-mode .block-tag {
        font-size: 0.64rem;
        padding: 1px 6px;
      }
      /* Collapsible desc */
      .compact-mode .block-desc {
        display: none;
        font-size: 0.74rem;
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px dashed var(--border);
      }
      .compact-mode .plan-block.desc-open .block-desc {
        display: block;
      }
      .compact-mode .plan-block::after {
        content: '⋯';
        position: absolute;
        right: 12px;
        bottom: 8px;
        font-size: 0.7rem;
        color: var(--text-dim);
        opacity: 0.5;
      }
      .compact-mode .plan-block.desc-open::after {
        content: '∧';
      }

      /* Subtasks in compact */
      .compact-mode .block-subtasks {
        margin-top: 8px;
        padding-top: 6px;
      }
      .compact-mode .subtasks-label { font-size: 0.65rem; margin-bottom: 4px; }
      .compact-mode .subtask-item { font-size: 0.8rem; line-height: 1.4; }

      /* Summary bar compact */
      .compact-mode .summary-bar {
        padding: 10px 14px;
        gap: 10px;
        border-radius: 10px;
        flex-wrap: wrap;
      }
      .compact-mode .summary-sep { height: 24px; }
      .compact-mode .summary-value { font-size: 0.85rem; }
      .compact-mode .summary-label { font-size: 0.62rem; }
      .compact-mode .summary-hint { display: none; }

      /* Low power compact */
      .compact-mode .lowpower-block { padding: 10px 14px; margin-bottom: 4px; }
      .compact-mode .lowpower-time { font-size: 0.66rem; }
      .compact-mode .lowpower-action { font-size: 0.82rem; }
      .compact-mode .lowpower-note { font-size: 0.68rem; }

      /* Non-compact mobile still gets some reduction */
      .plan-block { padding: 14px 16px; }
      .block-action { font-size: 1.15rem; }

      /* ── 1. PLAN HEADER: two-row layout on mobile ── */
      .plan-header {
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      .plan-title { order: -1; width: 100%; margin-bottom: 2px; }
      .back-btn { font-size: 0.78rem; padding: 6px 10px; flex-shrink: 0; }
      .copy-btn { font-size: 0.78rem; padding: 6px 10px; flex-shrink: 0; }

      /* ── 2. SUMMARY BAR: always wrap on mobile ── */
      .summary-bar { flex-wrap: wrap; gap: 10px; }
      .summary-sep { display: none; }
      .summary-item { min-width: 0; flex: 1 1 auto; }
      .summary-hint { display: none; }

      /* ── 3. LIVE BAR: wrap on mobile ── */
      .live-bar { flex-wrap: wrap; gap: 6px; }
      .live-clock { font-size: 1.1rem; }
      .live-countdown {
        white-space: normal;
        word-break: break-all;
        padding: 3px 8px;
        font-size: 0.72rem;
      }

      /* ── 4. LATE NIGHT BANNER: wrap ── */
      .late-night-banner { flex-wrap: wrap; }
      .late-night-dismiss {
        width: 100%;
        text-align: center;
        margin-left: 0;
        margin-top: 6px;
      }

      /* ── 5. CELEBRATE TOAST: allow wrap ── */
      .celebrate-toast {
        white-space: normal;
        font-size: 1.1rem;
        padding: 16px 28px;
      }

      /* ── 6. BUTTON GROUPS: mobile-friendly ── */
      .btn-group { gap: 6px; }
      .btn-group.two-col { gap: 6px; }
      #goalGroup {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .opt-btn {
        min-width: 60px;
        padding: 9px 6px;
        font-size: 0.82rem;
        min-width: 0;
      }
      .opt-btn .opt-icon { font-size: 1.1rem; }
      .energy-group .opt-btn,
      .compact-group .opt-btn {
        padding: 7px 10px;
        font-size: 0.82rem;
        min-width: 0;
      }

      /* ── 7. KEY FLEX CHILDREN: min-width: 0 ── */
      .block-main { min-width: 0; }
      .block-action { min-width: 0; overflow-wrap: break-word; word-break: break-word; }
      .block-meta { min-width: 0; flex-wrap: wrap; }
      .block-tag { flex-shrink: 0; }
      .block-duration { flex-shrink: 0; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Selection */
    ::selection { background: rgba(255,184,108,0.2); color: var(--text-primary); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <svg class="header-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="22" stroke="#FFB86C" stroke-width="1.5" stroke-opacity="0.4"/>
      <path d="M24 10C24 10 16 18 16 26C16 30.4183 19.5817 34 24 34C28.4183 34 32 30.4183 32 26C32 18 24 10 24 10Z" fill="#FFB86C" fill-opacity="0.2" stroke="#FFB86C" stroke-width="1.5"/>
      <circle cx="24" cy="26" r="4" fill="#FFB86C" fill-opacity="0.7"/>
      <line x1="24" y1="6" x2="24" y2="10" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="38" x2="24" y2="42" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="26" x2="10" y2="26" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="38" y1="26" x2="42" y2="26" stroke="#FFB86C" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Evening Anchor</h1>
    <p>给自己一个值得的夜晚</p>
  </header>

  <!-- FORM -->
  <div class="form-card" id="formCard">
    <div class="late-night-banner" id="lateNightBanner">
      <span>🌙</span>
      <div>
        <span class="ln-time" id="lnCurrentTime"></span>
        <div>深夜了，帮你精简到最核心的几项 →</div>
        <div class="ln-hint">已隐藏晚餐安排、今晚目标、明日事项（精力不足时默认休息）</div>
      </div>
      <button class="late-night-dismiss" onclick="dismissLateNight()">显示全部</button>
    </div>

    <div class="field" data-late="keep">
      <div class="field-label"><span class="emoji">🕐</span>预计下班到家时间</div>
      <div class="time-input-wrap">
        <input type="time" id="arrivalTime" value="19:30" />
      </div>
    </div>

    <div class="field" data-late="keep">
      <div class="field-label"><span class="emoji">⚡</span>当前精力状态</div>
      <div class="btn-group compact-group energy-group" id="energyGroup">
        <button class="opt-btn" data-value="low" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🪫</span>
          <span class="opt-text">低</span>
        </button>
        <button class="opt-btn selected" data-value="mid" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🟡</span>
          <span class="opt-text">中</span>
        </button>
        <button class="opt-btn" data-value="high" onclick="selectOpt(this,'energy')">
          <span class="opt-icon">🔋</span>
          <span class="opt-text">高</span>
        </button>
      </div>
    </div>

    <div class="field" data-late="hide">
      <div class="field-label"><span class="emoji">🍽️</span>晚餐安排</div>
      <div class="btn-group" id="sceneGroup">
        <button class="opt-btn selected-cool" data-value="alone" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">🍜</span>
          <span>独自用餐</span>
        </button>
        <button class="opt-btn" data-value="couple" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">💑</span>
          <span>和伴侣吃</span>
        </button>
        <button class="opt-btn" data-value="parents" onclick="selectOpt(this,'scene')">
          <span class="opt-icon">🏠</span>
          <span>回父母家吃</span>
        </button>
      </div>
      <div class="conditional-field" id="parentsReturnField">
        <div style="margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span style="font-size:0.8rem; color:var(--text-muted); white-space:nowrap;">出发时间</span>
          <input type="time" id="parentsReturnTime" value="18:30"
            style="width:120px; background:var(--bg-input);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:0.95rem;color:var(--text-primary);outline:none;"
            onfocus="this.style.borderColor='var(--accent-warm)'"
            onblur="this.style.borderColor='var(--border)'">
          <span style="font-size:0.78rem; color:var(--text-dim);">出门去父母家的时间</span>
        </div>
      </div>
    </div>

    <div class="field" data-late="hide">
      <div class="field-label"><span class="emoji">🎯</span>今晚主目标</div>
      <div class="btn-group" id="goalGroup">
        <button class="opt-btn" data-value="rest" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🛋️</span>
          <span>休息</span>
        </button>
        <button class="opt-btn selected-cool" data-value="productivity" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">📋</span>
          <span>生产力</span>
        </button>

        <button class="opt-btn" data-value="hobby" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🎨</span>
          <span>爱好</span>
        </button>
        <button class="opt-btn" data-value="health" onclick="selectOpt(this,'goal')">
          <span class="opt-icon">🏃</span>
          <span>健康</span>
        </button>
      </div>
    </div>

    <div class="field" data-late="hide">
      <div class="field-label"><span class="emoji">⏰</span>明日重要事项</div>
      <div class="btn-group compact-group" id="tomorrowGroup">
        <button class="opt-btn" data-value="none" onclick="selectOpt(this,'tomorrow')">
          <span class="opt-icon">🈚</span>
          <span class="opt-text">无</span>
        </button>
        <button class="opt-btn" data-value="has" onclick="selectOpt(this,'tomorrow')">
          <span class="opt-icon">📌</span>
          <span class="opt-text">有</span>
        </button>
      </div>
      <div class="conditional-field" id="tomorrowTimeField">
        <div style="margin-top:10px;">
          <input type="time" id="tomorrowTime" value="08:00" style="width:100%;background:var(--bg-input);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--text-primary);outline:none;" onfocus="this.style.borderColor='var(--accent-warm)'" onblur="this.style.borderColor='var(--border)'">
        </div>
      </div>
    </div>

    <div class="field" data-late="keep">
      <div class="field-label"><span class="emoji">🔥</span>今晚必须完成的事</div>
      <textarea id="mustDoInput" rows="3" placeholder="例如：写完项目报告初稿、给妈妈打电话、还信用卡……&#10;也可以留空"></textarea>
    </div>

    <div class="field" data-late="keep">
      <div class="field-label"><span class="emoji">🌙</span>预计入睡时间</div>
      <div class="time-input-wrap">
        <input type="time" id="sleepTimeInput" value="23:00" />
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generatePlan()">
      <span class="btn-text">生成我的晚间计划 →</span>
      <span class="spinner"></span>
    </button>
  </div>

  <!-- PLAN VIEW -->
  <div class="plan-view" id="planView">
    <div class="plan-header">
      <button class="back-btn" onclick="resetForm()">← 重新填写</button>
      <div class="plan-title">📋 今晚安排</div>
      <button class="copy-btn" id="exportBtn" onclick="exportImage()">🖼 导出</button>
      <button class="copy-btn" id="copyBtn" onclick="copyPlan()">📋 复制</button>
    </div>

    <div class="live-bar" id="liveBar">
      <span class="live-clock" id="liveClock">--:--</span>
      <span class="live-countdown" id="liveCountdown"></span>
    </div>

    <div class="summary-bar" id="summaryBar">
      <!-- filled by JS -->
    </div>

    <div class="progress-wrap" id="progressWrap" style="display:none; margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;">完成进度</span>
        <span id="progressText" style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--accent-low);">0/0</span>
      </div>
      <div style="height:4px;background:var(--bg-input);border-radius:4px;overflow:hidden;">
        <div id="progressBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent-low),var(--accent-cool));border-radius:4px;transition:width 0.4s ease;"></div>
      </div>
    </div>

    <div class="compact-toggle">
      <button class="compact-btn" id="compactBtn" onclick="toggleCompact()">📐 紧凑模式</button>
    </div>
    <div class="plan-blocks" id="planBlocks">
      <!-- filled by JS -->
    </div>

    <div class="lowpower-toggle">
      <button class="lowpower-trigger" id="lowpowerToggle" onclick="toggleLowPower()">
        <span>🔋</span>
        <span id="lowpowerLabel">精力不支时的保底方案</span>
      </button>
      <div class="lowpower-section" id="lowpowerSection">
        <div class="lowpower-header">当今晚感觉撑不住时，打开这个清单，只需要照做</div>
        <div id="lowpowerBlocks"></div>
      </div>
    </div>

    <div class="footer-note">照着第一步开始，其他的会自动到来 🌙</div>
  </div>

</div>

<script>
  /* ─── STATE ─── */
  const state = {
    energy: 'mid',
    scene: 'alone',
    goal: 'productivity',
    tomorrow: 'none',
    tomorrowTime: '08:00',
    mustDo: '',
    sleepTime: '23:00'
  };

  const LATE_NIGHT_HOUR = 22; // trigger at 22:00
  let lateNightMode = false;

  /* ─── LATE NIGHT AUTO-SIMPLIFY ─── */
  function checkLateNight() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    if (h < LATE_NIGHT_HOUR) return; // daytime, skip

    lateNightMode = true;

    // Show banner
    const banner = document.getElementById('lateNightBanner');
    banner.style.display = 'flex';
    document.getElementById('lnCurrentTime').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

    // Auto-fill smart defaults
    const nowStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    document.getElementById('arrivalTime').value = nowStr;

    // Set energy to low if midnight
    if (h >= 23) {
      clickOpt('energyGroup', 'low');
    }

    // Set goal to rest
    clickOpt('goalGroup', 'rest');

    // Set tomorrow to none
    clickOpt('tomorrowGroup', 'none');

    // Hide non-essential fields
    document.querySelectorAll('[data-late="hide"]').forEach(el => {
      el.classList.add('late-hidden');
    });
  }

  function clickOpt(groupId, value) {
    const btn = document.querySelector(`#${groupId} [data-value="${value}"]`);
    if (btn) selectOpt(btn, groupId.replace('Group', ''));
  }

  function dismissLateNight() {
    lateNightMode = false;
    document.getElementById('lateNightBanner').style.display = 'none';
    document.querySelectorAll('.late-hidden').forEach(el => el.classList.remove('late-hidden'));
  }

  // Run on page load
  checkLateNight();

  /* ─── SELECT OPTION ─── */
  function selectOpt(el, group) {
    const parent = el.parentElement;
    parent.querySelectorAll('.opt-btn').forEach(b => {
      b.classList.remove('selected', 'selected-cool');
    });
    el.classList.add(group === 'scene' || group === 'goal' ? 'selected-cool' : 'selected');
    state[group] = el.dataset.value;

    if (group === 'tomorrow') {
      document.getElementById('tomorrowTimeField').classList.toggle('visible', state.tomorrow === 'has');
    }
    if (group === 'scene') {
      document.getElementById('parentsReturnField').classList.toggle('visible', state.scene === 'parents');
    }
  }

  /* ─── ADD MINUTES TO TIME ─── */
  // Returns { time: 'HH:MM', crossedMidnight: boolean }
  // crossedMidnight indicates if we passed midnight during the addition
  function addMinutesWithFlag(timeStr, mins) {
    const [h, m] = timeStr.split(':').map(Number);
    const totalMins = h * 60 + m + mins;
    const days = Math.floor(totalMins / (24 * 60));
    const nh = Math.floor((totalMins % (24 * 60)) / 60);
    const nm = totalMins % 60;
    return {
      time: `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`,
      crossedMidnight: days > 0
    };
  }

  function addMinutes(timeStr, mins) {
    return addMinutesWithFlag(timeStr, mins).time;
  }

  function clockMins(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
  }

  function minutesBetween(start, end) {
    let diff = clockMins(end) - clockMins(start);
    if (diff < 0) diff += 24 * 60;
    return diff;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ─── TIME RANGE LABEL ─── */
  function timeRange(start, mins) {
    const result = addMinutesWithFlag(start, mins);
    return { start, end: result.time, crossedMidnight: result.crossedMidnight };
  }

  // 精力等级排序：high > mid > low
  const ENERGY_RANK = { high: 3, mid: 2, low: 1 };

  // 从任务库中挑选匹配的任务
  // category: 单个类别字符串 或 类别数组 或 'any' 表示不限
  // energy: 当前精力等级
  // maxMins: 该时段最大可用分钟数
  // exclude: 已选任务的索引（避免重复）
  function pickTasks(categories, energy, maxMins, exclude = []) {
    const catList = categories === 'any'
      ? Object.keys(TASK_LIBRARY.reduce((a, t) => { a[t.cat] = 1; return a; }, {}))
      : Array.isArray(categories) ? categories : [categories];

    const candidates = TASK_LIBRARY
      .map((t, i) => ({ ...t, _idx: i }))
      .filter(t => catList.includes(t.cat))
      .filter(t => ENERGY_RANK[t.energy] <= ENERGY_RANK[energy])
      .filter(t => !exclude.includes(t._idx));

    // 按匹配度排序：精力等级越高越好，时长越接近maxMins越好
    candidates.sort((a, b) => {
      const eDiff = ENERGY_RANK[b.energy] - ENERGY_RANK[a.energy];
      if (eDiff !== 0) return eDiff;
      const aFit = Math.abs(a.dur - maxMins);
      const bFit = Math.abs(b.dur - maxMins);
      return aFit - bFit;
    });

    return candidates;
  }

  /* ─── PLAN BUILDER ─── */
  function buildPlan(arrival, energy, scene, goal, tomorrow, parentsReturnTime, mustDo, sleepTime) {
    const blocks = [];
    const arrivalMins = parseTimeHM(arrival);
    const sleepMins = parseTimeHM(sleepTime || '23:00');
    // Handle midnight crossing: if sleep is earlier than arrival, it's tomorrow
    const totalAvail = sleepMins <= arrivalMins 
      ? (24 * 60 - arrivalMins) + sleepMins  // crosses midnight
      : sleepMins - arrivalMins;             // same day
    
    let cursorMins = 0; // minutes since arrival (relative)
    
    const toTimeStr = (offsetMins) => {
      const absMins = (arrivalMins + offsetMins) % (24 * 60);
      const h = Math.floor(absMins / 60);

      const start = toTimeStr(cursorMins);

    // ── MUST-DO TIME ESTIMATOR ──────────────────────────────────────
    // Analyzes natural language text to estimate how many minutes a task takes.
    function estimateDuration(text) {
      if (!text) return null;
      const t = text.toLowerCase();

      // 1. Explicit numeric mentions: "20分钟", "1小时", "半小时"
      const numMatch = t.match(/(\d+(?:\.\d+)?)\s*(?:分钟|分|min|mins?)/i);
      if (numMatch) return Math.round(parseFloat(numMatch[1]));

      const hourMatch = t.match(/(\d+(?:\.\d+)?)\s*(?:小时|时|hour|hr)/i);
      if (hourMatch) return Math.round(parseFloat(hourMatch[1]) * 60);

      if (/\b(半小时|三十分钟|30分钟)\b/.test(t)) return 30;
      if (/\b(十五分钟|十五分|15分钟|15分)\b/.test(t)) return 15;
      if (/\b(二十分钟|二十分|20分钟|20分)\b/.test(t)) return 20;
      if (/\b(十分钟|十分|10分钟|10分)\b/.test(t)) return 10;
      if (/\b(45分钟|四十五分钟)\b/.test(t)) return 45;
      if (/\b(1小时|一个小时)\b/.test(t)) return 60;

      // 2. Keyword → rough duration estimate
      const SCORE = {
        // Quick actions (<= 10 min)
        '喝水': 5, '喝水': 5, '打电话': 10, '发消息': 5, '回邮件': 10,

        '洗澡': 20, '洗头': 20, '洗发': 20, '收拾': 20, '整理': 20,

        '刷手机': 20, '刷视频': 20, '刷短视频': 15, '短视频': 15,
        '敷面膜': 15, '面膜': 15,
        // Medium (30-60 min)
        '做饭': 40, '做晚饭': 40, '做午饭': 30, '做午饭': 30, '煮饭': 30,
        '看书': 30, '读书': 30, '阅读': 30, '看书': 30,
        '复习': 30, '复习功课': 40,
        '刷题': 30, '做题': 30, '练题': 30, '做作业': 40,
        '写': 30, '写作': 45, '写文章': 45, '写东西': 30, '写字': 20,
        '学习': 45, '上网课': 40, '课程': 40,
        '运动': 40, '跑步': 30, '健身': 40, '锻炼': 40, '瑜伽': 30,
        '冥想': 15, '正念': 15,
        '做家务': 30, '家务': 30, '清洁': 30, '打扫': 25,
        '画画': 45, '绘画': 45, '画画': 45,
        '练琴': 30, '乐器': 30, '练乐器': 30, '乐器': 30,
        // Heavy (> 45 min)
        '视频剪辑': 60, '剪辑': 60, '修图': 30, 'PS': 45,
        '学英语': 45, '英语': 45,
        '整理照片': 30, '修照片': 30,
        '做项目': 60, '项目': 60, '工作': 45,
        '加班': 60, '办公': 45,
      };

      let best = null;
      let bestLen = 0;
      for (const [kw, dur] of Object.entries(SCORE)) {
        if (t.includes(kw) && kw.length > bestLen) {
          best = dur; bestLen = kw.length;
        }
      }
      return best;
    }

    // ── MUST-DO BLOCK (priority if user filled it) ─────────────────
    if (mustDo && mustDo.trim()) {
      const rawItems = mustDo.trim().split(/[,，\n]+/).map(t => t.trim()).filter(Boolean);
      // Use the first item as the primary must-do action
      const primary = rawItems[0];
      const extraItems = rawItems.slice(1);
      const estDur = estimateDuration(primary);
      // Target 70% of estimated duration, min 15, max remaining time
      const dur = estDur
        ? Math.max(15, Math.min(Math.round(estDur * 0.7), remainingUntilSleep()))
        : Math.min(30, remainingUntilSleep());

      if (dur >= 5) {
        b = makeBlock(dur, '🔥', primary, 'focus', '杂务',
          estDur ? `根据内容估计约需 ${estDur} 分钟，先专注完成核心部分` : '这是你今晚最重要的事，专注完成它',
          { sub: extraItems, cat: '杂务' }

    }

    // ── MAIN GOAL BLOCKS ──
    const usedIdx = []; // track used task library indices to avoid repeats
    function makeTaskBlock(tasks, mins) {
      const actualMins = Math.min(mins, remainingUntilSleep());
      if (actualMins < 5) return false;
      let task = null;
      for (const t of tasks) {
        if (t.dur <= actualMins + 15) { task = t; break; }
      }
      if (!task) task = tasks[0];
      if (!task) return false;
      const dur = Math.min(task.dur, actualMins);
      b = makeBlock(dur, task.icon, task.action,
        task.energy === 'high' ? 'focus' : (task.energy === 'mid' ? 'warm' : 'rest'),
        task.cat, task.desc,
        { cat: task.cat }
      );
      if (b) {
        usedIdx.push(task._idx);
        blocks.push(b);
        return true;
      }
      return false;
    }
    function addBuffer(mins) {
      if (remainingUntilSleep() < mins) mins = remainingUntilSleep();
      if (mins < 5) return;
      b = makeBlock(mins, '☕', '休息一下', 'rest', '恢复', '站起来走动，伸展一下，喝点水', { cat: '恢复' });
      if (b) blocks.push(b);
    }

    if (goal === 'productivity') {
      if (isHigh) {
        const tasks = pickTasks(['学习', '杂务'], energy, 90, usedIdx);

        addBuffer(10);
        const tasks2 = pickTasks(['学习', '杂务'], energy, 30, usedIdx);
        makeTaskBlock(tasks2, 20);
      } else if (isMid) {
        const tasks = pickTasks(['学习', '杂务'], energy, 45, usedIdx);

          const tasks2 = pickTasks(['杂务', '学习'], energy, 20, usedIdx);
          makeTaskBlock(tasks2, 15);
        }
      } else {
        const tasks = pickTasks(['杂务', '学习'], energy, 20, usedIdx);

    if (goal === 'health') {

        const tasks = pickTasks(['运动', '恢复'], energy, 60, usedIdx);
        makeTaskBlock(tasks, 50);
        addBuffer(10);

        makeTaskBlock(tasks2, 15);
      } else if (isMid) {

    }

    if (goal === 'hobby') {

        makeTaskBlock(tasks, 60);
        if (remainingUntilSleep() >= 30) {
          addBuffer(10);
          const tasks2 = pickTasks(['爱好', '运动'], energy, 30, usedIdx);
          makeTaskBlock(tasks2, 20);
        }
      } else if (isMid) {
        const tasks = pickTasks(['爱好', '运动'], energy, 45, usedIdx);
        makeTaskBlock(tasks, 35);
      } else {
        const tasks = pickTasks(['爱好', '恢复', '运动'], energy, 20, usedIdx);
        makeTaskBlock(tasks, 15);
      }
    }

    if (goal === 'rest') {
      if (isLow) {
        const tasks = pickTasks(['娱乐放松', '恢复', '陪伴'], energy, 50, usedIdx);
        makeTaskBlock(tasks, 45);
        if (remainingUntilSleep() >= 20) {
          const tasks2 = pickTasks(['娱乐放松', '恢复'], energy, 20, usedIdx);
          makeTaskBlock(tasks2, 15);
        }
      } else {
        const tasks = pickTasks(['娱乐放松', '爱好', '恢复'], energy, 50, usedIdx);
        makeTaskBlock(tasks, 40);
        if (remainingUntilSleep() >= 25) {
          addBuffer(5);
          const tasks2 = pickTasks(['娱乐放松', '爱好'], energy, 20, usedIdx);
          makeTaskBlock(tasks2, 15);
        }
      }
    }

    // ── EVENING WIND DOWN ──
    const windDownMins = isLow ? 30 : 45;
    b = makeBlock(windDownMins, '🌙', '晚间放松时光', 'rest', '娱乐放松', isLow ? '躺着听音乐、翻翻手机、什么都不想' : '洗漱 + 放松阅读/轻度浏览');
    if (b) blocks.push(b);

    // ── TOMORROW PREP ──
    if (hasTomorrow) {
      b = makeBlock(15, '📌', '明日准备', 'easy', '杂务', '整理背包、确认闹钟、列出明天最重要的3件事');
      if (b) blocks.push(b);
    }

    // ── BEDTIME ROUTINE ──
    const remaining = remainingUntilSleep();
    if (remaining >= 5) {
      const bedMins = Math.min(remaining, 20);
      b = makeBlock(bedMins, '🛁', '睡前仪式', 'rest', '个人护理', '洗漱、关灯、写3件今天满意的事（可选）');
      if (b) blocks.push(b);
    }

    return blocks;
  }

  /* ─── LOW POWER PLAN ─── */
  function buildLowPowerPlan(arrival, sleepTime) {
    const blocks = [];
    const arrivalMins = parseTimeHM(arrival);
    const sleepMins = parseTimeHM(sleepTime || '23:00');
    const totalAvail = sleepMins <= arrivalMins 
      ? (24 * 60 - arrivalMins) + sleepMins
      : sleepMins - arrivalMins;
    
    let cursorMins = 0;
    
    const toTimeStr = (offsetMins) => {
      const absMins = (arrivalMins + offsetMins) % (24 * 60);
      const h = Math.floor(absMins / 60);
      const m = absMins % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    };
    
    const remainingUntilSleep = () => totalAvail - cursorMins;
    
    function makeBlock(dur, action, note) {
      if (cursorMins + dur > totalAvail) {
        dur = totalAvail - cursorMins;
        if (dur < 5) return null;
      }
      const start = toTimeStr(cursorMins);
      cursorMins += dur;
      const end = toTimeStr(cursorMins);
      return { time: { start, end }, action, note };
    }

    let b;
    b = makeBlock(5, '换衣服、坐下', '不需要做任何事，只是换好衣服');
    if (b) blocks.push(b);

    b = makeBlock(20, '简单吃点东西', '热一碗汤、吃点水果，不要勉强做饭');
    if (b) blocks.push(b);

    b = makeBlock(30, '躺着或坐着，随便干什么', '看手机、听歌、什么都不干都行');
    if (b) blocks.push(b);

    b = makeBlock(15, '简单洗漱', '刷牙、洗脸就够了');
    if (b) blocks.push(b);

    const remaining = remainingUntilSleep();
    if (remaining >= 5) {
      b = makeBlock(Math.min(remaining, 10), '关灯，躺下', '睡不着也没关系，躺着就是休息');
      if (b) blocks.push(b);
    }

    return blocks;
  }

  /* ─── TAG CLASS ─── */

  /* ─── GENERATE ─── */
  function generatePlan() {
    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    setTimeout(() => {
      const arrival = document.getElementById('arrivalTime').value;
      const sleepTime = document.getElementById('sleepTimeInput').value;
      const mustDo = document.getElementById('mustDoInput').value;
      const parentsReturnTime = state.scene === 'parents'
        ? document.getElementById('parentsReturnTime').value
        : null;
      const mainPlan = buildPlan(arrival, state.energy, state.scene, state.goal, state.tomorrow, parentsReturnTime, mustDo, sleepTime);
      const lowPower = buildLowPowerPlan(arrival, sleepTime);

      renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo);

      document.getElementById('formCard').classList.add('hidden');
      document.getElementById('planView').classList.add('visible');
      document.getElementById('progressWrap').style.display = 'block';
      updateProgress();
      btn.classList.remove('loading');
      btn.disabled = false;

      // Stagger blocks
      document.querySelectorAll('.plan-block').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 120);
      });

      // Low power blocks stagger
      setTimeout(() => {
        document.querySelectorAll('.lowpower-block').forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 80);
        });
      }, mainPlan.length * 120 + 300);
    }, 900);
  }

  /* ─── RENDER PLAN ─── */
  function renderPlan(arrival, mainPlan, lowPower, sleepTime, mustDo) {
    // Summary
    const [ah, am] = arrival.split(':').map(Number);
    const [sh, sm] = (sleepTime || '23:00').split(':').map(Number);
    const totalMins = minutesBetween(arrival, sleepTime || '23:00');
    const hrs = Math.floor(totalMins / 60);
    const mins = totalMins % 60;
    const energyLabel = { low: '🪫 低', mid: '🟡 中', high: '🔋 高' };
    const goalLabel = goalConfig[state.goal]?.label || state.goal;

    document.getElementById('summaryBar').innerHTML = `
      <div class="summary-item">
        <span class="summary-label">到家</span>
        <span class="summary-value">${arrival}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">可用时间</span>
        <span class="summary-value">${hrs}小时${mins > 0 ? mins + '分' : ''}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">精力</span>
        <span class="summary-value">${energyLabel[state.energy]}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">目标</span>
        <span class="summary-value">${goalConfig[state.goal]?.icon || ''} ${goalLabel}</span>
      </div>
      <div class="summary-sep"></div>
      <div class="summary-item">
        <span class="summary-label">入睡</span>
        <span class="summary-value">${sleepTime || '23:00'}</span>
      </div>
      <span class="summary-hint">${sceneLabels[state.scene]}</span>
    `;

    // Main blocks
    const blocksHtml = mainPlan.map((b, i) => {
      const subHtml = (b.sub && b.sub.length)
        ? `<div class="block-subtasks">
             <div class="subtasks-label">🔥 今晚必须完成</div>
             ${b.sub.map(t => `<div class="subtask-item"><span class="subtask-dot"></span>${escapeHtml(t)}</div>`).join('')}
           </div>`
        : '';
      return `
      <div class="plan-block ${b.type} ${i === 0 ? 'first' : ''}">
        <input type="checkbox" class="block-check" onclick="toggleBlockDone(this)" />
        ${i === 0 ? '<div class="first-badge">▶ 第一步，从这里开始</div>' : ''}
        <div class="block-time">
          <span class="block-start">${b.time.start}</span>
          <span style="color:var(--text-dim)">→</span>
          <span class="block-end">${b.time.end}</span>
          <span class="block-duration">${minutesBetween(b.time.start, b.time.end)}分钟</span>
        </div>
        <div class="block-main">
          <span class="block-icon">${b.icon}</span>
          <span class="block-action">${b.action}</span>
        </div>
        <div class="block-meta">
          <span class="block-tag ${tagClass(b.type)}">${b.tag}</span>
        </div>
        <div class="block-desc">${b.desc}</div>
        ${subHtml}
      </div>
    `}).join('');

    document.getElementById('planBlocks').innerHTML = blocksHtml;

    // Low power blocks
    const lpHtml = lowPower.map(b => `
      <div class="lowpower-block">
        <input type="checkbox" class="block-check" onclick="toggleLowDone(this)" style="position:absolute;right:12px;top:10px;width:18px;height:18px;appearance:none;-webkit-appearance:none;border:2px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;" />
        <span class="lowpower-time">${b.time.start} – ${b.time.end}</span>
        <span class="lowpower-action">${b.action}</span>
        <div class="lowpower-note">${b.note}</div>
      </div>
    `).join('');

    document.getElementById('lowpowerBlocks').innerHTML = lpHtml;

    // Reset lowpower toggle
    document.getElementById('lowpowerSection').classList.remove('visible');
    document.getElementById('lowpowerLabel').textContent = '精力不支时的保底方案';

    // Start live countdown
    startLiveTimer(mainPlan);
    // Cache for copy
    cachedPlan = { arrival, mainPlan, lowPower, sleepTime, mustDo };
  }

  function parseTime(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  /* ─── TOGGLE LOW POWER ─── */
  function toggleLowPower() {
    const sec = document.getElementById('lowpowerSection');
    const label = document.getElementById('lowpowerLabel');
    const isOpen = sec.classList.toggle('visible');
    label.textContent = isOpen ? '收起保底方案 ↑' : '精力不支时的保底方案';
  }

  /* ─── RESET ─── */
  function resetForm() {
    document.getElementById('planView').classList.remove('visible');
    document.getElementById('formCard').classList.remove('hidden');
    document.getElementById('progressWrap').style.display = 'none';
    isCompact = false;
    document.getElementById('planView').classList.remove('compact-mode');
    document.getElementById('compactBtn').classList.remove('active');
    document.getElementById('compactBtn').textContent = '📐 紧凑模式';
    if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
    celebrated = false;
  }

  /* ─── LIVE COUNTDOWN ─── */
  let liveTimer = null;
  let planBlocks = []; // cached block times [{start, end}, ...]
  let cachedPlan = null; // full plan data for copy

  function parseTimeHM(str) {
    const [h, m] = str.split(':').map(Number);
    return h * 60 + m;
  }

  function startLiveTimer(blocks) {
    // blocks: array of {time: {start, end}} from buildPlan output
    // Handle midnight crossing: normalize all times to absolute minutes
    const firstStart = blocks.length ? parseTimeHM(blocks[0].time.start) : 0;
    let runningTotal = firstStart;
    
    planBlocks = blocks.map((b, idx) => {
      const startMins = parseTimeHM(b.time.start);
      const endMins = parseTimeHM(b.time.end);
      // Calculate duration from the time strings
      let dur = endMins - startMins;
      if (dur <= 0) dur += 24 * 60; // crosses midnight
      
      // Use running total for accurate positioning
      const absStart = (idx === 0) ? startMins : runningTotal;
      const absEnd = absStart + dur;
      runningTotal = absEnd;
      
      return { startMins: absStart, endMins: absEnd };
    });
    
    tick();
    if (liveTimer) clearInterval(liveTimer);
    liveTimer = setInterval(tick, 15000); // every 15s
  }

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const nowClockMins = now.getHours() * 60 + now.getMinutes();
    
    // Determine if we need to adjust for midnight crossing
    let nowMins = nowClockMins;
    if (planBlocks.length) {
      const lastEnd = planBlocks[planBlocks.length - 1].endMins;
      const firstStart = planBlocks[0].startMins;
      // If plan crosses midnight and we're in the post-midnight portion
      if (lastEnd >= 24 * 60 && nowClockMins < firstStart) {
        nowMins += 24 * 60;
      }
    }
    
    document.getElementById('liveClock').textContent = `${hh}:${mm}`;

    const cdEl = document.getElementById('liveCountdown');
    const allBlocks = document.querySelectorAll('#planBlocks .plan-block');

    // Remove old classes
    allBlocks.forEach(b => b.classList.remove('current', 'past'));

    if (!planBlocks.length) { cdEl.textContent = ''; return; }

    // Find current / next block
    let currentIdx = -1;
    let nextIdx = -1;
    for (let i = 0; i < planBlocks.length; i++) {
      const b = planBlocks[i];
      if (nowMins >= b.startMins && nowMins < b.endMins) {
        currentIdx = i;
        break;
      }
      if (nowMins < b.startMins && nextIdx === -1) {
        nextIdx = i;
      }
    }

    // Mark past blocks
    for (let i = 0; i < planBlocks.length; i++) {
      if (i < currentIdx || (currentIdx === -1 && nowMins >= planBlocks[i].endMins)) {
        allBlocks[i]?.classList.add('past');
      }
    }

    // Highlight current
    if (currentIdx >= 0) {
      allBlocks[currentIdx]?.classList.add('current');
      const remain = planBlocks[currentIdx].endMins - nowMins;
      cdEl.textContent = `⏳ 当前: ${remain} 分钟剩余`;
      cdEl.classList.remove('idle');
    } else if (nextIdx >= 0) {
      const wait = planBlocks[nextIdx].startMins - nowMins;
      cdEl.textContent = `▶ ${wait} 分钟后开始下一项`;
      cdEl.classList.remove('idle');
    } else {
      cdEl.textContent = '🌙 计划已结束';
      cdEl.classList.add('idle');
    }
  }

  /* ─── COPY PLAN ─── */
  function copyPlan() {
    if (!cachedPlan) return;
    const { arrival, mainPlan, lowPower, sleepTime, mustDo } = cachedPlan;
    const goalLabel = goalConfig[state.goal]?.label || state.goal;
    const energyLabel = { low: '低', mid: '中', high: '高' };

    let text = `📋 今晚安排\n`;
    text += `到家 ${arrival} ｜ ${energyLabel[state.energy]}精力 ｜ ${sceneLabels[state.scene]}\n`;
    text += `目标: ${goalLabel} ｜ 入睡 ${sleepTime}\n`;
    if (mustDo) text += `必做: ${mustDo}\n`;
    text += `${'─'.repeat(20)}\n\n`;

    mainPlan.forEach(b => {
      const dur = minutesBetween(b.time.start, b.time.end);
      text += `${b.time.start} → ${b.time.end}  ${b.icon} ${b.action} (${dur}分钟)\n`;
      text += `   ${b.desc}\n`;
      if (b.sub?.length) {
        text += `   🔥 必做:\n`;
        b.sub.forEach(t => { text += `   · ${t}\n`; });
      }
      text += '\n';
    });

    text += `${'─'.repeat(20)}\n`;
    text += `🔋 保底方案\n\n`;
    lowPower.forEach(b => {
      text += `${b.time.start} → ${b.time.end}  ${b.action}\n   ${b.note}\n\n`;
    });

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ 已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 复制';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  /* ─── EXPORT IMAGE ─── */
  function exportImage() {
    const btn = document.getElementById('exportBtn');
    btn.textContent = '⏳ 生成中…';
    btn.disabled = true;

    const planView = document.getElementById('planView');
    const liveBar = document.getElementById('liveBar');
    const planHeader = planView.querySelector('.plan-header');
    const summaryBar = planView.querySelector('.summary-bar');
    const progressWrap = planView.querySelector('#progressWrap');
    const compactToggle = planView.querySelector('.compact-toggle');
    const lowpowerToggle = planView.querySelector('.lowpower-toggle');
    const footerNote = planView.querySelector('.footer-note');

    // Elements to hide during capture
    const toHide = [planHeader, liveBar, compactToggle, footerNote];
    const originalDisplays = toHide.map(el => el ? el.style.display : null);
    toHide.forEach(el => { if (el) el.style.display = 'none'; });

    if (typeof html2canvas !== 'function') {
      toHide.forEach((el, i) => { if (el) el.style.display = originalDisplays[i] || ''; });
      btn.textContent = '🖼 导出';
      btn.disabled = false;
      alert('图片导出组件加载失败，请联网刷新后再试。');
      return;
    }

    // Use the entire planView for capture
    html2canvas(planView, {
      backgroundColor: '#FDF6EC',
      scale: 2,
      useCORS: true,
      logging: false
    }).then(canvas => {
      toHide.forEach((el, i) => { if (el) el.style.display = originalDisplays[i] || ''; });

      const link = document.createElement('a');
      link.download = `晚间安排_${new Date().toISOString().slice(0,10)}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      btn.textContent = '✅ 已保存';
      setTimeout(() => {
        btn.textContent = '🖼 导出';
        btn.disabled = false;
      }, 2000);
    }).catch(() => {
      toHide.forEach((el, i) => { if (el) el.style.display = originalDisplays[i] || ''; });
      btn.textContent = '🖼 导出';
      btn.disabled = false;
      alert('图片导出失败，请稍后重试。');
    });
  }

  /* ─── COMPACT MODE ─── */
  let isCompact = false;
  function toggleCompact() {
    isCompact = !isCompact;
    const view = document.getElementById('planView');
    const btn = document.getElementById('compactBtn');
    view.classList.toggle('compact-mode', isCompact);
    btn.classList.toggle('active', isCompact);
    btn.textContent = isCompact ? '📐 展开模式' : '📐 紧凑模式';
  }

  /* ─── BLOCK DESC TOGGLE (compact mode) ─── */
  document.addEventListener('click', function(e) {
    if (!isCompact) return;
    const block = e.target.closest('.plan-block');
    if (!block) return;
    // Don't toggle if clicking checkbox or subtasks area
    if (e.target.closest('.block-check')) return;
    if (e.target.closest('.block-subtasks')) return;
    block.classList.toggle('desc-open');
  });

  /* ─── CHECKBOX TOGGLE ─── */
  function toggleBlockDone(cb) {
    const block = cb.closest('.plan-block');
    block.classList.toggle('done', cb.checked);
    updateProgress();
  }

  function toggleLowDone(cb) {
    const block = cb.closest('.lowpower-block');
    if (cb.checked) {
      block.style.opacity = '0.4';
      block.style.textDecoration = 'line-through';
      block.style.color = 'var(--text-dim)';
    } else {
      block.style.opacity = '1';
      block.style.textDecoration = 'none';
      block.style.color = '';
    }
    if (cb.style.cssText) {
      // Update checked style
      cb.style.background = cb.checked ? 'var(--accent-low)' : 'transparent';
      cb.style.borderColor = cb.checked ? 'var(--accent-low)' : 'var(--border)';
    }
  }

  /* ─── PROGRESS BAR ─── */
  function updateProgress() {
    const total = document.querySelectorAll('#planBlocks .plan-block').length;
    const done = document.querySelectorAll('#planBlocks .plan-block.done').length;
    const bar = document.getElementById('progressBar');
    if (!bar) return;
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    bar.style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done}/${total}`;

    // All done → celebrate!
    if (total > 0 && done === total) {
      setTimeout(celebrate, 300);
    }
  }

  /* ─── CELEBRATION (confetti + toast) ─── */
  let celebrated = false;
  const CONFETTI_COLORS = ['#FFD93D','#FF6B6B','#6BCB77','#4D96FF','#FF922B','#CC5DE8','#20C997'];

  function celebrate() {
    if (celebrated) return;
    celebrated = true;

    // Toast
    const toast = document.createElement('div');
    toast.className = 'celebrate-toast';
    toast.textContent = '🎉 全部完成！A night well spent';
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 500);
    }, 2800);

    // Confetti canvas
    const cvs = document.createElement('canvas');
    cvs.id = 'confettiCanvas';
    document.body.appendChild(cvs);
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
    const ctx = cvs.getContext('2d');

    const pieces = Array.from({length: 80}, () => ({
      x: Math.random() * cvs.width,
      y: Math.random() * cvs.height - cvs.height,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 3,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 2,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      opacity: 1
    }));

    let frame = 0;
    const maxFrames = 150;
    function draw() {
      frame++;
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      const fadeStart = maxFrames - 40;
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;
        p.rot += p.rotV;
        if (frame > fadeStart) p.opacity = Math.max(0, 1 - (frame - fadeStart) / 40);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      if (frame < maxFrames) {
        requestAnimationFrame(draw);
      } else {
        cvs.remove();
        celebrated = false; // allow re-celebrate if uncheck + recheck
      }
    }
    requestAnimationFrame(draw);
  }
</script>
<script>
  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Auto-update: when a new SW is found, skip waiting and reload
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'activated') {
            // New SW activated, reload to get fresh content
            if (navigator.serviceWorker.controller) {
              window.location.reload();
            }
          }
        });
      });
    }).catch(() => {});
  }
</script>
